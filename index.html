<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Planner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#111;min-height:100vh}
  .page{max-width:1060px;margin:0 auto;padding:22px 12px 48px}
  .hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
  .hdr h1{font-size:21px;font-weight:700;letter-spacing:-0.3px}
  .hdr p{font-size:12px;color:#888;margin-top:3px}
  .updated{font-size:11px;color:#bbb;margin-top:4px}
  .refresh-btn{padding:8px 16px;font-size:12px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#444;white-space:nowrap;flex-shrink:0}
  .refresh-btn:hover{background:#f5f5f5}
  .refresh-btn:disabled{opacity:0.5;cursor:default}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .leg-div{width:1px;height:14px;background:#ddd}
  .matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{border-collapse:separate;border-spacing:4px;width:100%;min-width:640px}
  thead th{padding:0}
  .th-spacer{width:152px;min-width:132px}
  .th-day{text-align:center;padding:0 2px 10px;min-width:84px}
  .th-day-label{font-size:13px;font-weight:600;color:#111}
  .th-day-date{font-size:11px;color:#aaa;margin-top:2px}
  .th-day.is-today .th-day-label{color:#2563eb}
  .th-day.is-today .th-day-date{color:#93c5fd}
  .spot-row td{padding:2px}
  .spot-label{background:#fff;border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;justify-content:center;height:100%;min-height:88px}
  .spot-label-name{font-size:12px;font-weight:600;line-height:1.3}
  .spot-label-region{font-size:10px;color:#999;margin-top:2px}
  .activity-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;margin-top:4px;font-weight:600}
  .pill-kite{background:#dbeafe;color:#1e40af}
  .pill-sup{background:#d1fae5;color:#065f46}
  .score-cell{background:#fff;border-radius:10px;padding:9px 5px;text-align:center;cursor:pointer;transition:transform 0.12s ease,box-shadow 0.12s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:88px;-webkit-tap-highlight-color:transparent;position:relative}
  .score-cell:hover,.score-cell:active{transform:scale(1.05);box-shadow:0 4px 14px rgba(0,0,0,0.13);z-index:2}
  .score-cell.is-today{outline:2px solid #93c5fd;outline-offset:-2px}
  .sc-score{font-size:24px;font-weight:800;line-height:1}
  .sc-no{font-size:11px;font-weight:700;color:#dc2626;line-height:1}
  .sc-no-reason{font-size:9px;color:#fca5a5;margin-top:2px;line-height:1.2;max-width:68px;text-align:center}
  .sc-bar{width:34px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
  .sc-fill{height:100%;border-radius:2px}
  .sc-wind{font-size:10px;color:#bbb;margin-top:1px;white-space:nowrap}
  .sc-dir{font-size:10px;font-weight:700;margin-top:1px}
  .band-epic{background:#f0fdf4}.band-epic .sc-score{color:#059669}.band-epic .sc-fill{background:#059669}
  .band-good{background:#eff6ff}.band-good .sc-score{color:#2563eb}.band-good .sc-fill{background:#2563eb}
  .band-ok{background:#fffbeb}.band-ok .sc-score{color:#d97706}.band-ok .sc-fill{background:#d97706}
  .band-poor{background:#fafafa}.band-poor .sc-score{color:#ccc}.band-poor .sc-fill{background:#ddd}
  .band-no{background:#fff5f5}
  .dir-good{color:#059669}.dir-ok{color:#d97706}.dir-bad{color:#dc2626}.dir-neutral{color:#bbb}
  .section-row td{padding:10px 4px 2px;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.5px}
  .pop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
  .pop-overlay.show{display:flex}
  @media(min-width:520px){.pop-overlay{align-items:center;padding:20px}}
  .popover{background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 36px;width:100%;max-width:460px;animation:slideUp 0.2s ease;overflow-y:auto;max-height:92vh}
  @media(min-width:520px){.popover{border-radius:16px;padding:22px;max-height:88vh}}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .pop-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
  @media(min-width:520px){.pop-handle{display:none}}
  .pop-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
  .pop-title{font-size:16px;font-weight:700}
  .pop-subtitle{font-size:12px;color:#999;margin-top:2px}
  .pop-close{background:#f0f0f0;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;color:#888;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px}
  .pop-score-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0}
  .pop-score-num{font-size:54px;font-weight:800;line-height:1}
  .pop-score-label{font-size:13px;font-weight:600;padding:5px 12px;border-radius:8px}
  .label-epic{background:#f0fdf4;color:#059669}
  .label-good{background:#eff6ff;color:#2563eb}
  .label-ok{background:#fffbeb;color:#d97706}
  .label-poor{background:#fafafa;color:#aaa;border:1px solid #eee}
  .label-no{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
  .pop-no-banner{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13px;color:#dc2626;line-height:1.5}
  .pop-section{margin-bottom:10px}
  .pop-section-title{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .pop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
  .pop-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
  .pop-cell{background:#f7f7f7;border-radius:10px;padding:9px 10px}
  .pop-cell.flag-good{background:#f0fdf4}
  .pop-cell.flag-warn{background:#fffbeb}
  .pop-cell.flag-bad{background:#fff5f5}
  .pop-cell-label{font-size:10px;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px}
  .pop-cell-val{font-size:14px;font-weight:700;color:#111}
  .pop-cell-sub{font-size:11px;color:#bbb;margin-top:2px}
  .score-breakdown{background:#f7f7f7;border-radius:10px;padding:10px 12px;margin-bottom:10px}
  .sb-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:4px 0;border-bottom:1px solid #efefef}
  .sb-row:last-child{border-bottom:none}
  .sb-label{color:#666;flex:1;padding-right:8px}
  .sb-note{color:#bbb;font-size:10px;display:block;margin-top:1px}
  .sb-val{font-weight:600;font-size:11px;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .sb-epic{background:#f0fdf4;color:#059669}
  .sb-good{background:#eff6ff;color:#2563eb}
  .sb-ok{background:#fffbeb;color:#d97706}
  .sb-poor{background:#fafafa;color:#aaa;border:1px solid #eee}
  .sb-no{background:#fff5f5;color:#dc2626}
  .tide-wrap{background:#f7f7f7;border-radius:10px;padding:12px 13px;margin-bottom:10px}
  .tide-events{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
  .tide-event{font-size:12px;padding:4px 10px;border-radius:6px;font-weight:600}
  .tide-hw{background:#dbeafe;color:#1e40af}
  .tide-lw{background:#fef3c7;color:#92400e}
  .tide-hw.tide-good{background:#bbf7d0;color:#065f46}
  .tide-hw.tide-bad{background:#fecaca;color:#991b1b}
  .tide-disclaimer{font-size:11px;color:#aaa;margin:6px 0 10px;line-height:1.5}
  .tide-link{display:flex;align-items:center;justify-content:center;padding:9px 14px;background:#1e40af;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
  .tide-link:hover{background:#1d3a8a}
  .wind-window-note{font-size:11px;color:#888;margin-top:8px;font-style:italic}
  .pop-verdict{font-size:13px;color:#555;background:#f7f7f7;border-radius:10px;padding:11px 13px;line-height:1.65;margin-top:4px}
  .state-box{padding:48px 20px;text-align:center;color:#999;font-size:14px;line-height:1.8}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#888;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:#c00}
  .retry-btn{margin-top:14px;display:inline-block;padding:8px 20px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;font-size:13px}
  .src{font-size:11px;color:#ccc;margin-top:18px;text-align:right}
  .data-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;font-weight:600}
  .badge-sg{background:#fef3c7;color:#92400e}
  .badge-om{background:#e0f2fe;color:#075985}
  .badge-ad{background:#f0fdf4;color:#065f46}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div>
      <h1>Activity Planner</h1>
      <p>Kitesurfing &amp; Paddleboarding — 7-day forecast</p>
      <div class="updated" id="updatedAt"></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="init()">↻ Refresh</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#059669"></div>Epic (8–10)</div>
    <div class="leg"><div class="leg-dot" style="background:#2563eb"></div>Good (6–7)</div>
    <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Fair (4–5)</div>
    <div class="leg"><div class="leg-dot" style="background:#ccc"></div>Poor (&lt;4)</div>
    <div class="leg"><div class="leg-dot" style="background:#fca5a5"></div>NO-GO</div>
    <div class="leg-div"></div>
    <div class="leg" style="color:#bbb">· tap for detail</div>
  </div>
  <div id="main" class="matrix-wrap">
    <div class="state-box"><span class="spin"></span>Loading forecast…</div>
  </div>
  <p class="src">
    Wind: Open-Meteo UKMO <span class="data-badge badge-om">OM</span>
    · Waves: Stormglass <span class="data-badge badge-sg">SG</span>
    · Tides: ADMIRALTY UKHO <span class="data-badge badge-ad">AD</span>
  </p>
</div>

<div class="pop-overlay" id="popOverlay" onclick="handleOverlayClick(event)">
  <div class="popover" id="popover">
    <div class="pop-handle"></div>
    <div class="pop-top">
      <div><div class="pop-title" id="popTitle"></div><div class="pop-subtitle" id="popSubtitle"></div></div>
      <button class="pop-close" onclick="closePop()">×</button>
    </div>
    <div class="pop-score-row">
      <div class="pop-score-num" id="popScoreNum"></div>
      <div class="pop-score-label" id="popScoreLabel"></div>
    </div>
    <div id="popNoBanner"></div>
    <div class="pop-section"><div class="pop-section-title">Score breakdown</div><div class="score-breakdown" id="popBreakdown"></div></div>
    <div class="pop-section">
      <div class="pop-section-title">Wind <span id="popWindNote" style="font-weight:400;color:#888;font-size:10px;text-transform:none;letter-spacing:0;font-style:italic"></span></div>
      <div class="pop-grid" id="popWind"></div>
    </div>
    <div class="pop-section"><div class="pop-section-title">Conditions</div><div class="pop-grid" id="popConditions"></div></div>
    <div class="pop-section"><div class="pop-section-title">Waves &amp; swell <span class="data-badge badge-sg">Stormglass</span></div><div class="pop-grid-3" id="popWaves"></div></div>
    <div class="pop-section"><div class="pop-section-title">Tides <span class="data-badge badge-ad">ADMIRALTY</span></div><div class="tide-wrap" id="popTides"></div></div>
    <div class="pop-verdict" id="popVerdict"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────
var PROXY      = 'https://restless-voice-367a.james-gareh.workers.dev';
var SG_KEY     = '3401cf78-3523-11f1-9fff-0242ac120004-3401d00e-3523-11f1-9fff-0242ac120004';
var AD_KEY     = 'c0f36924b48c4d0b9de9df5c1eae0200';

var EASYTIDE = {
  weston:       'https://easytide.admiralty.co.uk/?PortID=0527',
  saunton_kite: 'https://easytide.admiralty.co.uk/?PortID=0535',
  saunton_sup:  'https://easytide.admiralty.co.uk/?PortID=0535',
  restbay:      'https://easytide.admiralty.co.uk/?PortID=0512'
};

var AD_STATIONS = {
  weston:  '0527',
  saunton: '0535',
  restbay: '0512'
};

// ── Spots ─────────────────────────────────────────────────
var SPOTS = [
  { id:'weston',      name:'Weston-super-Mare', region:'Somerset',           activity:'kite', lat:51.346,  lon:-2.9878, scoring:'weston'      },
  { id:'saunton_kite',name:'Saunton Sands',     region:'Devon — Kite',       activity:'kite', lat:51.1059, lon:-4.2178, scoring:'saunton_kite' },
  { id:'saunton_sup', name:'Saunton Sands',     region:'Devon — SUP',        activity:'sup',  lat:51.1059, lon:-4.2178, scoring:'saunton_sup'  },
  { id:'restbay',     name:'Rest Bay Porthcawl',region:'South Wales',        activity:'sup',  lat:51.4878, lon:-3.7127, scoring:'restbay'      }
];

var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var WX_CODES = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm'};
var WX_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️'};

// ── Helpers ───────────────────────────────────────────────
function toMph(kmh){ return kmh!=null?kmh*0.621371:null; }
function msToMph(ms){ return ms!=null?ms*2.23694:null; }
function mToFt(m){ return m!=null?m*3.281:null; }

function d2dir(d){
  if(d==null)return'—';
  var a=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return a[Math.round(d/22.5)%16];
}
function bft(kmh){
  if(!kmh||kmh<2)return'Calm';
  if(kmh<20)return'Light'; if(kmh<39)return'Moderate–Fresh';
  if(kmh<62)return'Strong'; return'Gale+';
}
function avgArr(arr,i,n){
  if(!arr)return null;
  var sl=arr.slice(i,i+n).filter(function(v){return v!=null;});
  return sl.length?sl.reduce(function(a,b){return a+b;},0)/sl.length:null;
}
function avgIdx(arr,indices){
  if(!arr||!indices||!indices.length)return null;
  var vals=indices.map(function(i){return arr[i];}).filter(function(v){return v!=null;});
  return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;
}
function estimateDusk(lat,dateOffset){
  var d=new Date(); d.setDate(d.getDate()+dateOffset);
  var start=new Date(d.getFullYear(),0,0);
  var doy=Math.round((d-start)/86400000);
  var B=(360/365)*(doy-81)*Math.PI/180;
  var decl=23.45*Math.sin(B)*Math.PI/180;
  var latR=lat*Math.PI/180;
  var ha=Math.acos(-Math.tan(latR)*Math.tan(decl))*180/Math.PI;
  return Math.round((12+ha/15)*60);
}
function minsToTime(m){ var h=Math.floor(m/60),mn=m%60; return h.toString().padStart(2,'0')+':'+(mn<10?'0':'')+mn; }
function isBST(){ var d=new Date(); return d.getTimezoneOffset()<Math.max(new Date(d.getFullYear(),0,1).getTimezoneOffset(),new Date(d.getFullYear(),6,1).getTimezoneOffset()); }

// ── Shared scoring helpers ────────────────────────────────
function scoreTempWeather(airTemp,wxCode){
  var tempBase=airTemp!=null?(airTemp>=15?10:airTemp>=10?5:0):0;
  var wxBonus=0,wxNote='';
  if(wxCode!=null){
    if(wxCode<=2){wxBonus=5;wxNote='Clear/sunny';}
    else if(wxCode===3){wxBonus=4;wxNote='Overcast';}
    else if(wxCode>=51&&wxCode<=55){wxBonus=2;wxNote='Light drizzle';}
    else if(wxCode>=61&&wxCode<=63){wxBonus=1;wxNote='Light rain';}
    else if(wxCode===65||wxCode>=80){wxBonus=0;wxNote='Heavy rain';}
    else{wxBonus=3;wxNote=WX_CODES[wxCode]||'';}
  }
  var score=Math.min(15,tempBase+wxBonus);
  var note=airTemp!=null?Math.round(airTemp)+'°C'+(wxNote?' · '+wxNote:''):wxNote;
  return{score:score,max:15,note:note};
}

// Find nearest LW in tideEvents, return {hourIdx, timeStr, diff}
function findNearestLW(tideEvents, refMins){
  var lwEvs=(tideEvents||[]).filter(function(e){return e.type==='LW';});
  var best=null,bestDiff=9999;
  lwEvs.forEach(function(ev){
    if(ev.hourIdx==null)return;
    var diff=Math.abs(ev.timeMins-(refMins||720));
    if(diff<bestDiff){bestDiff=diff;best=ev;}
  });
  return best?{ev:best,diff:bestDiff}:null;
}

// Extract wind at specific indices from wx arrays
function windAtIdx(data, indices){
  return{
    ws:  avgIdx(data.wsArr,  indices),
    wd:  avgIdx(data.wdArr,  indices),
    gust:avgIdx(data.gustArr,indices)
  };
}

// ── Data stores ───────────────────────────────────────────
var wxData={}, sgData={}, tideData={}, comp={};

// ── FETCH: Open-Meteo wind (UKMO model) ──────────────────
function fetchWx(sp){
  return new Promise(function(resolve){
    var model=sp.id==='weston'?'&models=ukmo_seamless':'&models=ukmo_seamless';
    var url='https://api.open-meteo.com/v1/forecast?latitude='+sp.lat+'&longitude='+sp.lon+
      '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability,weather_code'+
      '&wind_speed_unit=kmh&timezone=Europe%2FLondon&forecast_days=7'+model;
    fetch(url)
      .then(function(r){return r.json();})
      .then(function(j){wxData[sp.id]=j;resolve();})
      .catch(function(){wxData[sp.id]=null;resolve();});
  });
}

// ── FETCH: Stormglass waves (via proxy) ──────────────────
function fetchSG(sp){
  return new Promise(function(resolve){
    var now=new Date();
    var start=new Date(now); start.setHours(0,0,0,0);
    var end=new Date(start); end.setDate(end.getDate()+7);
    var params='waveHeight,wavePeriod,waveDirection,swellHeight,swellPeriod,swellDirection,windWaveHeight,waterTemperature';
    var sgUrl='https://api.stormglass.io/v2/weather/point?lat='+sp.lat+'&lng='+sp.lon+
      '&params='+params+'&start='+start.toISOString()+'&end='+end.toISOString();
    var proxyUrl=PROXY+'?url='+encodeURIComponent(sgUrl);
    fetch(proxyUrl,{headers:{'Authorization':SG_KEY}})
      .then(function(r){return r.json();})
      .then(function(j){sgData[sp.id]=j;resolve();})
      .catch(function(){sgData[sp.id]=null;resolve();});
  });
}

// ── FETCH: ADMIRALTY tides (via proxy) ───────────────────
function fetchTides(spotId, stationId){
  return new Promise(function(resolve){
    var adUrl='https://admiraltyapi.azure-api.net/uktidalapi/api/V1/Stations/'+stationId+'/TidalEvents?duration=7';
    var proxyUrl=PROXY+'?url='+encodeURIComponent(adUrl);
    fetch(proxyUrl,{headers:{'Ocp-Apim-Subscription-Key':AD_KEY}})
      .then(function(r){return r.json();})
      .then(function(events){
        // Group by date, convert GMT to local
        var byDate={};
        var bstOffset=isBST()?60:0;
        (events||[]).forEach(function(ev){
          var gmtDate=new Date(ev.DateTime+'Z');
          var localDate=new Date(gmtDate.getTime()+bstOffset*60000);
          var dateStr=gmtDate.toISOString().split('T')[0];
          var h=localDate.getUTCHours().toString().padStart(2,'0');
          var m=localDate.getUTCMinutes().toString().padStart(2,'0');
          var localTime=h+':'+m;
          var timeMins=localDate.getUTCHours()*60+localDate.getUTCMinutes();
          if(!byDate[dateStr])byDate[dateStr]=[];
          byDate[dateStr].push({
            type:ev.EventType==='HighWater'?'HW':'LW',
            height:ev.Height,
            localTime:localTime,
            timeMins:timeMins,
            hourIdx:localDate.getUTCHours(), // approximate hour within day
            isApprox:ev.IsApproximateTime
          });
        });
        tideData[spotId]=byDate;

// ── EXTRACT: Weather for day ──────────────────────────────
function extractWx(json,di){
  if(!json||!json.hourly)return null;
  var h=json.hourly,b=di*24,mid=b+11;
  return{
    wsArr:   h.wind_speed_10m||null,
    wdArr:   h.wind_direction_10m||null,
    gustArr: h.wind_gusts_10m||null,
    airTemp: h.temperature_2m&&h.temperature_2m[mid]!=null?h.temperature_2m[mid]:null,
    precip:  avgArr(h.precipitation_probability,mid,3),
    wxCode:  h.weather_code&&h.weather_code[mid]!=null?h.weather_code[mid]:null,
    middayIdx:mid,
    hourlyLen:(h.wind_speed_10m||[]).length,
    dayBase: b
  };
}

// ── EXTRACT: Stormglass waves for day ────────────────────
// Stormglass returns hourly data; pick midday values
// waveHeight in metres, use SG's sg value (blended source)
function extractSG(json,di){
  if(!json||!json.hours)return{waveHeight:null,wavePeriod:null,waveDir:null,swellHeight:null,swellPeriod:null,swellDir:null,seaTemp:null};
  var target=new Date(); target.setDate(target.getDate()+di); target.setHours(13,0,0,0);
  var targetISO=target.toISOString().substring(0,13); // "YYYY-MM-DDTHH"
  var hour=null;
  json.hours.forEach(function(h){
    if(h.time&&h.time.substring(0,13)===targetISO)hour=h;
  });
  if(!hour){
    // fallback: find closest hour within that day
    var dayStr=target.toISOString().split('T')[0];
    var dayHours=json.hours.filter(function(h){return h.time&&h.time.startsWith(dayStr);});
    if(dayHours.length)hour=dayHours[Math.floor(dayHours.length/2)];
  }
  if(!hour)return{waveHeight:null,wavePeriod:null,waveDir:null,swellHeight:null,swellPeriod:null,swellDir:null,seaTemp:null};
  function val(key){ var v=hour[key]; if(!v)return null; return v.sg!=null?v.sg:v.noaa!=null?v.noaa:v.icon!=null?v.icon:null; }
  return{
    waveHeight:  val('waveHeight'),
    wavePeriod:  val('wavePeriod'),
    waveDir:     val('waveDirection'),
    swellHeight: val('swellHeight'),
    swellPeriod: val('swellPeriod'),
    swellDir:    val('swellDirection'),
    seaTemp:     val('waterTemperature')
  };
}

// ── EXTRACT: ADMIRALTY tides for day ─────────────────────
function getTideEvents(spotId,di){
  var d=new Date(); d.setDate(d.getDate()+di);
  var dateStr=d.toISOString().split('T')[0];
  var data=tideData[spotId];
  if(!data||!data[dateStr])return[];
  return data[dateStr];
}

// ─── Weston Kite ──────────────────────────────────────────
function scoreWeston(wx,waves,tideEvs,duskMins){
  var noGo=false,noGoReasons=[],breakdown=[],total=0,weight=0;

  // 1. TIDE: HW between 09:00 and dusk — hard gate, Weight 25
  var tideScore=0,tideNote='No tide data',bestHW=null;
  var hwEvs=tideEvs.filter(function(e){return e.type==='HW';});
  hwEvs.forEach(function(ev){
    if(bestHW)return;
    if(ev.timeMins>=540&&ev.timeMins<=duskMins){
      bestHW=ev; tideScore=25;
      tideNote='HW '+ev.localTime+(ev.isApprox?' (approx)':'');
    }
  });
  if(hwEvs.length&&!bestHW){
    noGo=true;
    noGoReasons.push('HW not between 09:00 and dusk. HW at: '+hwEvs.map(function(e){return e.localTime;}).join(', '));
    tideNote='HW outside window — NO-GO';
  } else if(!hwEvs.length){ tideScore=8; tideNote='No tide data'; }
  breakdown.push({label:'Tide (HW 09:00–dusk)',score:tideScore,max:25,note:tideNote});
  total+=tideScore; weight+=25;

  // Wind at HW ±1hr
  var windW={ws:null,wd:null,gust:null},windLabel='midday';
  if(bestHW&&wx){
    var hi=wx.dayBase+bestHW.hourIdx;
    var idxs=[hi-1,hi,hi+1].filter(function(i){return i>=0&&i<wx.hourlyLen;});
    windW=windAtIdx(wx,idxs);
    windLabel='avg ±1hr of HW '+bestHW.localTime;
  } else if(wx){
    windW=windAtIdx(wx,[wx.middayIdx-1,wx.middayIdx,wx.middayIdx+1]);
  }
  wx._ws=windW.ws; wx._wd=windW.wd; wx._gust=windW.gust; wx._windLabel=windLabel;

  // 2. WIND DIRECTION — Weight 25
  var dir=d2dir(windW.wd);
  var dirScore=0,dirNote=dir;
  var validDirs=['S','SSW','SW','WSW','W','WNW','NW'];
  if(validDirs.indexOf(dir)===-1){
    noGo=true; noGoReasons.push('Wind direction '+dir+' outside S–NW arc — NO-GO');
    dirNote=dir+' — outside arc';
  } else if(dir==='SW'){dirScore=25;dirNote=dir+' — ideal';}
  else if(dir==='SSW'||dir==='WSW'){dirScore=20;dirNote=dir+' — good';}
  else if(dir==='WNW'||dir==='NW'){dirScore=15;dirNote=dir+' — ok';}
  else{dirScore=10;dirNote=dir+' — not so good';}
  breakdown.push({label:'Wind direction',score:dirScore,max:25,note:dirNote});
  total+=dirScore; weight+=25;

  // 3. WIND SPEED — Weight 25
  var wsMph=toMph(windW.ws);
  var windScore=0,windNote=wsMph!=null?Math.round(wsMph)+' mph':'—';
  if(wsMph!=null){
    if(wsMph>=18&&wsMph<=24){windScore=25;windNote=Math.round(wsMph)+' mph — ideal';}
    else if(wsMph>=14&&wsMph<18){windScore=18;windNote=Math.round(wsMph)+' mph — good (light)';}
    else if(wsMph>24&&wsMph<=30){windScore=18;windNote=Math.round(wsMph)+' mph — good (strong)';}
    else if(wsMph>=10&&wsMph<14){windScore=8;windNote=Math.round(wsMph)+' mph — too light';}
    else if(wsMph>30&&wsMph<=35){windScore=8;windNote=Math.round(wsMph)+' mph — getting strong';}
    else if(wsMph>35){windScore=2;windNote=Math.round(wsMph)+' mph — too strong';}
    else{windScore=2;windNote=Math.round(wsMph)+' mph — too light';}
  }
  breakdown.push({label:'Wind speed',score:windScore,max:25,note:windNote});
  total+=windScore; weight+=25;

  // 4. TEMP & WEATHER — Weight 25
  var t=scoreTempWeather(wx?wx.airTemp:null,wx?wx.wxCode:null);
  var tAdj={score:Math.round(t.score*25/15),max:25,note:t.note};
  breakdown.push({label:'Temp & weather',score:tAdj.score,max:tAdj.max,note:tAdj.note});
  total+=tAdj.score; weight+=tAdj.max;

  return{score:noGo?0:Math.min(10,(total/weight)*10),noGo:noGo,noGoReasons:noGoReasons,breakdown:breakdown};
}

// ─── Saunton Kite ─────────────────────────────────────────
function scoreSauntonKite(wx,waves,tideEvs,duskMins){
  var noGo=false,noGoReasons=[],breakdown=[],total=0,weight=0;

  // 1. WAVE HEIGHT — Weight 20, >5ft NO-GO
  var wh=waves?waves.swellHeight||waves.waveHeight:null;
  var waveFt=mToFt(wh);
  var waveScore=0,waveNote=waveFt!=null?Math.round(waveFt)+'ft':'—';
  if(waveFt!=null){
    if(waveFt>5){noGo=true;noGoReasons.push('Waves too big (~'+Math.round(waveFt)+'ft, >5ft NO-GO)');waveScore=0;waveNote=Math.round(waveFt)+'ft — NO-GO';}
    else if(waveFt<=3){waveScore=20;waveNote=Math.round(waveFt)+'ft — good';}
    else if(waveFt<=5){waveScore=10;waveNote=Math.round(waveFt)+'ft — just ok';}
  } else{waveScore=10;waveNote='No wave data';}
  breakdown.push({label:'Wave height',score:waveScore,max:20,note:waveNote});
  total+=waveScore; weight+=20;

  // Wind at LW ±1hr
  var lwRes=findNearestLW(tideEvs,720);
  var windW={ws:null,wd:null,gust:null},windLabel='midday';
  if(lwRes&&wx){
    var hi=wx.dayBase+lwRes.ev.hourIdx;
    var idxs=[hi-1,hi,hi+1].filter(function(i){return i>=0&&i<wx.hourlyLen;});
    windW=windAtIdx(wx,idxs);

  } else if(wx){
    windW=windAtIdx(wx,[wx.middayIdx-1,wx.middayIdx,wx.middayIdx+1]);
  }
  wx._ws=windW.ws; wx._wd=windW.wd; wx._gust=windW.gust; wx._windLabel=windLabel;

  // 2. WIND DIRECTION — Weight 25
  var dir=d2dir(windW.wd);
  var dirScore=0,dirNote=dir;
  var noGoDirs=['E','ENE','NE'];
  if(noGoDirs.indexOf(dir)>=0){
    noGo=true;noGoReasons.push('Wind direction '+dir+' is offshore — NO-GO');
    dirNote=dir+' — offshore, NO-GO';
  } else if(dir==='W'){dirScore=25;dirNote=dir+' — ideal (onshore)';}
  else if(dir==='WSW'||dir==='WNW'){dirScore=23;dirNote=dir+' — ideal (cross-on)';}
  else if(dir==='SW'||dir==='NW'){dirScore=18;dirNote=dir+' — good';}
  else if(['SSW','NNW','N','S'].indexOf(dir)>=0){dirScore=12;dirNote=dir+' — ok (cross)';}
  else if(['SSE','SE'].indexOf(dir)>=0){dirScore=8;dirNote=dir+' — marginal';}
  else if(dir==='ESE'){dirScore=3;dirNote=dir+' — nearly offshore';}
  else{dirScore=5;dirNote=dir;}
  breakdown.push({label:'Wind direction',score:dirScore,max:25,note:dirNote});
  total+=dirScore; weight+=25;

  // 3. WIND SPEED — Weight 20
  var wsMph=toMph(windW.ws);
  var windScore=0,windNote=wsMph!=null?Math.round(wsMph)+' mph':'—';
  if(wsMph!=null){
    if(wsMph>=18&&wsMph<=24){windScore=20;windNote=Math.round(wsMph)+' mph — ideal';}
    else if(wsMph>=14&&wsMph<18){windScore=14;windNote=Math.round(wsMph)+' mph — good (light)';}
    else if(wsMph>24&&wsMph<=30){windScore=14;windNote=Math.round(wsMph)+' mph — good (strong)';}
    else if(wsMph>=10&&wsMph<14){windScore=6;windNote=Math.round(wsMph)+' mph — too light';}
    else if(wsMph>30&&wsMph<=35){windScore=6;windNote=Math.round(wsMph)+' mph — getting strong';}
    else if(wsMph>35){windScore=2;windNote=Math.round(wsMph)+' mph — too strong';}
    else{windScore=2;windNote=Math.round(wsMph)+' mph — too light';}
  }
  breakdown.push({label:'Wind speed',score:windScore,max:20,note:windNote});
  total+=windScore; weight+=20;

  // 4. TIDE — Weight 15 (low = best)
  var tideScore=7,tideNote='No tide data';
  if(lwRes){
    if(lwRes.diff<=120){tideScore=15;tideNote='Near LW '+lwRes.ev.localTime+' — ideal';}
    else if(lwRes.diff<=240){tideScore=10;tideNote='Approaching LW '+lwRes.ev.localTime;}
    else{tideScore=5;tideNote='Far from LW';}
  }
  breakdown.push({label:'Tide (low = best)',score:tideScore,max:15,note:tideNote});
  total+=tideScore; weight+=15;

  // 5. SWELL PERIOD — Weight 10 (bonus for quality)
  var sp=waves?waves.swellPeriod||waves.wavePeriod:null;
  var periodScore=0,periodNote=sp!=null?sp.toFixed(0)+'s':'—';
  if(sp!=null){
    if(sp>=12){periodScore=10;periodNote=sp.toFixed(0)+'s — excellent';}
    else if(sp>=9){periodScore=7;periodNote=sp.toFixed(0)+'s — good';}
    else if(sp>=7){periodScore=4;periodNote=sp.toFixed(0)+'s — ok';}
    else{periodScore=1;periodNote=sp.toFixed(0)+'s — short period';}
  } else{periodScore=5;periodNote='No data';}
  breakdown.push({label:'Swell period',score:periodScore,max:10,note:periodNote});
  total+=periodScore; weight+=10;

  // 6. TEMP & WEATHER — Weight 10
  var t=scoreTempWeather(wx?wx.airTemp:null,wx?wx.wxCode:null);
  var tAdj={score:Math.round(t.score*10/15),max:10,note:t.note};
  breakdown.push({label:'Temp & weather',score:tAdj.score,max:tAdj.max,note:tAdj.note});
  total+=tAdj.score; weight+=tAdj.max;

  return{score:noGo?0:Math.min(10,(total/weight)*10),noGo:noGo,noGoReasons:noGoReasons,breakdown:breakdown};
}

    for(var i=0;i<7;i++){
      var wxJson  = sp.id.startsWith('saunton')?sauntonWxData:wxData[sp.id];
      var sgJson  = sp.id.startsWith('saunton')?sauntonSgData:sgData[sp.id];
      var wx      = extractWx(wxJson,i);
      var waves   = extractSG(sgJson,i);

      var d=new Date(); d.setDate(d.getDate()+i);
      var dateStr=d.toISOString().split('T')[0];

      var tideEvs=[];
      if(sp.id==='weston')      tideEvs=(tideData['weston']&&tideData['weston'][dateStr])||[];
      else if(sp.id.startsWith('saunton')) tideEvs=(tideData['saunton']&&tideData['saunton'][dateStr])||[];
      else if(sp.id==='restbay')tideEvs=(tideData['restbay']&&tideData['restbay'][dateStr])||[];

      var westonTideEvs=(westonTideMap[dateStr])||[];
      var dusk=estimateDusk(sp.lat,i);

      if(!wx){comp[sp.id].push(null);continue;}

      // Ensure wx has _ws etc initialised
      wx._ws=null;wx._wd=null;wx._gust=null;wx._windLabel='';

      var result;
      if(sp.scoring==='weston')           result=scoreWeston(wx,waves,tideEvs,dusk);
      else if(sp.scoring==='saunton_kite')result=scoreSauntonKite(wx,waves,tideEvs,dusk);
      else if(sp.scoring==='saunton_sup') result=scoreSauntonSUP(wx,waves,tideEvs,dusk);
      else                                result=scoreRestBay(wx,waves,tideEvs,westonTideEvs,dusk);

      comp[sp.id].push({
        score:result.score, noGo:result.noGo,
        noGoReasons:result.noGoReasons, breakdown:result.breakdown,
        _ws:wx._ws, _wd:wx._wd, _gust:wx._gust, _windLabel:wx._windLabel,
        airTemp:wx.airTemp, precip:wx.precip, wxCode:wx.wxCode,
        duskMins:dusk, tideEvs:tideEvs, westonTideEvs:westonTideEvs,
        waves:waves
      });
    }
  });
}

// ── Render ────────────────────────────────────────────────
function dayInfo(i){
  var d=new Date(); d.setDate(d.getDate()+i);
  return{short:i===0?'Today':i===1?'Tmrw':DAYS[d.getDay()],long:i===0?'Today':i===1?'Tomorrow':DAYS[d.getDay()],date:d.getDate()+' '+MONTHS[d.getMonth()]};
}
function band(s,noGo){
  if(noGo)return'band-no';
  if(s>=8)return'band-epic'; if(s>=6)return'band-good';
  if(s>=4)return'band-ok'; return'band-poor';
}
function bandColor(s,noGo){
  if(noGo)return'#dc2626';
  if(s>=8)return'#059669'; if(s>=6)return'#2563eb';
  if(s>=4)return'#d97706'; return'#bbb';
}
function bandLabel(s,noGo){
  if(noGo)return['NO-GO','label-no'];
  if(s>=8)return['Epic','label-epic']; if(s>=6)return['Good','label-good'];
  if(s>=4)return['Fair','label-ok']; return['Poor','label-poor'];
}
function sbClass(score,max){
  if(score===0&&max>0)return'sb-no';
  var p=score/max;
  if(p>=0.85)return'sb-epic'; if(p>=0.6)return'sb-good';
  if(p>=0.3)return'sb-ok'; return'sb-poor';
}
function dirClass(sid,dir){
  if(sid==='weston'){
    if(['SW','SSW','WSW'].indexOf(dir)>=0)return'dir-good';
    if(['WNW','NW','S','W'].indexOf(dir)>=0)return'dir-ok';
    return'dir-bad';
  }
  if(sid==='saunton_kite'){
    if(['W','WSW','WNW'].indexOf(dir)>=0)return'dir-good';
    if(['E','ENE','NE'].indexOf(dir)>=0)return'dir-bad';
    return'dir-ok';
  }
  if(sid==='saunton_sup'||sid==='restbay'){
    if(['NE','ENE','E','N','NNE'].indexOf(dir)>=0)return'dir-good';
    if(['SW','W','WSW','WNW','NW'].indexOf(dir)>=0)return'dir-bad';
    return'dir-ok';
  }
  return'dir-neutral';
}

function render(){
  var html='<table><thead><tr><th class="th-spacer"></th>';
  for(var d=0;d<7;d++){
    var inf=dayInfo(d);
    html+='<th class="th-day'+(d===0?' is-today':'')+'"><div class="th-day-label">'+inf.short+'</div><div class="th-day-date">'+inf.date+'</div></th>';
  }
  html+='</tr></thead><tbody>';

  var sections=[
    {label:'Weston-super-Mare',ids:['weston']},
    {label:'Saunton Sands',ids:['saunton_kite','saunton_sup']},
    {label:'Rest Bay, Porthcawl',ids:['restbay']}
  ];
  sections.forEach(function(sec){
    html+='<tr class="section-row"><td colspan="8">'+sec.label+'</td></tr>';
    sec.ids.forEach(function(sid){
      var sp=SPOTS.filter(function(s){return s.id===sid;})[0]; if(!sp)return;
      var pc=sp.activity==='kite'?'pill-kite':'pill-sup';
      var pl=sp.activity==='kite'?'Kitesurfing':'Paddleboarding';
      html+='<tr class="spot-row"><td><div class="spot-label"><div class="spot-label-name">'+sp.region+'</div><span class="activity-pill '+pc+'">'+pl+'</span></div></td>';
      for(var d=0;d<7;d++){
        var c=comp[sid]&&comp[sid][d];
        var tc=d===0?' is-today':'';
        if(!c){html+='<td><div class="score-cell band-poor'+tc+'"><div class="sc-score" style="font-size:14px">—</div></div></td>';continue;}
        var wxIcon=c.wxCode!=null?(WX_ICONS[c.wxCode]||''):'';
        var dir=d2dir(c._wd);
        var rws=toMph(c._ws)!=null?Math.round(toMph(c._ws)):0;
        if(c.noGo){
          var reason=c.noGoReasons&&c.noGoReasons[0]?c.noGoReasons[0].split('—')[0].trim():'Check conditions';
          if(reason.length>30)reason=reason.substring(0,28)+'…';
          html+='<td><div class="score-cell band-no'+tc+'" onclick="openPop(\''+sid+'\','+d+')">'+
            (wxIcon?'<div style="font-size:11px">'+wxIcon+'</div>':'')+
            '<div class="sc-no">NO-GO</div><div class="sc-no-reason">'+reason+'</div></div></td>';
        } else {
          var dc=dirClass(sid,dir);
          html+='<td><div class="score-cell '+band(c.score,false)+tc+'" onclick="openPop(\''+sid+'\','+d+')">'+
            (wxIcon?'<div style="font-size:12px;line-height:1">'+wxIcon+'</div>':'')+
            '<div class="sc-score">'+c.score.toFixed(1)+'</div>'+
            '<div class="sc-bar"><div class="sc-fill" style="width:'+Math.round(c.score*10)+'%"></div></div>'+
            '<div class="sc-wind">'+rws+' mph</div>'+
            '<div class="sc-dir '+dc+'">'+dir+'</div>'+
            '</div></td>';
        }
      }
      html+='</tr>';
    });
  });
  html+='</tbody></table>';
  document.getElementById('main').innerHTML=html;
  var now=new Date();
  document.getElementById('updatedAt').textContent='Updated '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
}

function pcell(lbl,val,sub,flag){
  return'<div class="pop-cell'+(flag?' flag-'+flag:'')+'"><div class="pop-cell-label">'+lbl+'</div><div class="pop-cell-val">'+val+'</div>'+(sub?'<div class="pop-cell-sub">'+sub+'</div>':'')+'</div>';
}

function openPop(sid,di){
  var sp=SPOTS.filter(function(s){return s.id===sid;})[0];
  var c=comp[sid]&&comp[sid][di]; if(!c)return;
  var inf=dayInfo(di),sc=c.score,bl=bandLabel(sc,c.noGo);
  document.getElementById('popTitle').textContent=sp.name+' — '+(sp.activity==='kite'?'Kitesurfing':'Paddleboarding');
  document.getElementById('popSubtitle').textContent=inf.long+' · '+inf.date;
  var sn=document.getElementById('popScoreNum'); sn.textContent=c.noGo?'—':sc.toFixed(1); sn.style.color=bandColor(sc,c.noGo);
  var sl=document.getElementById('popScoreLabel'); sl.textContent=bl[0]; sl.className='pop-score-label '+bl[1];
  var nb=document.getElementById('popNoBanner');
  nb.innerHTML=c.noGo&&c.noGoReasons&&c.noGoReasons.length?'<div class="pop-no-banner"><strong>NO-GO:</strong><br>'+c.noGoReasons.join('<br>')+'</div>':'';

  // Breakdown
  var bkHtml='';
  if(c.breakdown&&c.breakdown.length){
    c.breakdown.forEach(function(row){
      bkHtml+='<div class="sb-row"><span class="sb-label">'+row.label+'<span class="sb-note">'+row.note+'</span></span><span class="sb-val '+sbClass(row.score,row.max)+'">'+row.score+'/'+row.max+'</span></div>';
    });
  } else{bkHtml='<div style="font-size:12px;color:#bbb">No breakdown available</div>';}
  document.getElementById('popBreakdown').innerHTML=bkHtml;

  // Wind
  var dir=d2dir(c._wd);
  var wsMph=toMph(c._ws),gustMph=toMph(c._gust);
  var diffMph=wsMph!=null&&gustMph!=null?Math.round(gustMph-wsMph):null;
  var windFlag=wsMph!=null?(wsMph>=18&&wsMph<=24?'good':wsMph>=14&&wsMph<=30?'warn':'bad'):'';
  document.getElementById('popWindNote').textContent=c._windLabel?'('+c._windLabel+')':'';
  document.getElementById('popWind').innerHTML=
    pcell('Avg wind',wsMph!=null?Math.round(wsMph)+' mph':'—',dir+' · '+bft(c._ws||0),windFlag)+
    pcell('Gusts',gustMph!=null?Math.round(gustMph)+' mph':'—',diffMph!=null?'+'+diffMph+' mph vs avg':'','');

  // Conditions
  var wxDesc=c.wxCode!=null?((WX_ICONS[c.wxCode]||'')+' '+(WX_CODES[c.wxCode]||'')):'—';
  var airT=c.airTemp!=null?Math.round(c.airTemp)+'°C':'—';
  var tempFlag=c.airTemp!=null?(c.airTemp>=15?'good':c.airTemp>=10?'warn':'bad'):'';
  document.getElementById('popConditions').innerHTML=
    pcell('Weather',wxDesc,'','')+
    pcell('Air temp',airT,'Rain: '+(c.precip!=null?Math.round(c.precip)+'%':'—'),tempFlag)+
    pcell('Sea temp',c.waves&&c.waves.seaTemp!=null?Math.round(c.waves.seaTemp)+'°C':'—','','')+
    pcell('Rain chance',c.precip!=null?Math.round(c.precip)+'%':'—','','');

  // Waves (Stormglass)
  var w=c.waves||{};
  var whFt=mToFt(w.waveHeight),swFt=mToFt(w.swellHeight);
  document.getElementById('popWaves').innerHTML=
    pcell('Wave height',whFt!=null?Math.round(whFt)+'ft':'—',w.waveHeight!=null?'('+w.waveHeight.toFixed(2)+'m)':'')+
    pcell('Swell',swFt!=null?Math.round(swFt)+'ft':'—',w.swellPeriod!=null?w.swellPeriod.toFixed(0)+'s period':'')+
    pcell('Swell dir',d2dir(w.swellDir),'','' );

  // Tides (ADMIRALTY)
  var dusk=c.duskMins||1080;
  var tHTML='';
  if(sid==='weston') tHTML+='<div style="font-size:11px;color:#aaa;margin-bottom:8px">HW window: 09:00–'+minsToTime(dusk)+' (est. dusk)</div>';
  if(sid==='restbay') tHTML+='<div style="font-size:11px;color:#aaa;margin-bottom:8px">Tide proxy: Weston · NO-GO ±1hr of HT</div>';

  var displayEvs=sid==='restbay'?c.westonTideEvs:c.tideEvs;
  if(displayEvs&&displayEvs.length){
    tHTML+='<div class="tide-events">';
    displayEvs.forEach(function(ev){
      var isHW=ev.type==='HW';
      var hwCls='';
      if(isHW&&sid==='weston') hwCls=(ev.timeMins>=540&&ev.timeMins<=dusk)?' tide-good':' tide-bad';
      tHTML+='<span class="tide-event '+(isHW?'tide-hw':'tide-lw')+hwCls+'">'+(ev.isApprox?'~':'')+ev.type+' '+ev.localTime+' ('+ev.height.toFixed(1)+'m)</span>';
    });
    tHTML+='</div>';
    // Tidal range
    var hwH=displayEvs.filter(function(e){return e.type==='HW';});
    var lwH=displayEvs.filter(function(e){return e.type==='LW';});
    if(hwH.length&&lwH.length){
      var range=(Math.max.apply(null,hwH.map(function(e){return e.height;}))-Math.min.apply(null,lwH.map(function(e){return e.height;}))).toFixed(1);
      tHTML+='<div style="font-size:12px;color:#555;margin-top:6px">Tidal range: <strong>'+range+'m</strong>'+(sid==='weston'?' — plan launch ±2hrs of HW':'')+'</div>';
    }
  } else {
    tHTML+='<div class="tide-disclaimer">ADMIRALTY tide data loading…</div>';
  }
  tHTML+='<a class="tide-link" href="'+EASYTIDE[sid]+'" target="_blank" style="margin-top:10px;display:flex">View official ADMIRALTY tide times ↗</a>';
  document.getElementById('popTides').innerHTML=tHTML;

  // Verdict
  var parts=[];
  if(c.noGo){parts.push('Does not meet minimum requirements.');}
  else{
    if(sc>=8)parts.push('Excellent — all key factors look good.');
    else if(sc>=6)parts.push('Good conditions — worth going.');
    else if(sc>=4)parts.push('Borderline — check details before committing.');
    else parts.push('Poor overall — probably not worth it.');
    if(c.breakdown) c.breakdown.forEach(function(row){if(row.score<row.max*0.4)parts.push(row.label+': '+row.note+'.');});
  }
  document.getElementById('popVerdict').textContent=parts.join(' ');
  document.getElementById('popOverlay').classList.add('show');
}

function closePop(){document.getElementById('popOverlay').classList.remove('show');}
function handleOverlayClick(e){if(e.target===document.getElementById('popOverlay'))closePop();}

// ── Init ──────────────────────────────────────────────────
function init(){
  var btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='↻ Loading…';
  document.getElementById('main').innerHTML='<div class="state-box"><span class="spin"></span>Fetching forecast, waves &amp; tides…</div>';

  var fetches=[];

  // Wind: unique lat/lon only
  fetches.push(fetchWx({id:'weston',      lat:51.346,  lon:-2.9878}));
  fetches.push(fetchWx({id:'saunton_kite',lat:51.1059, lon:-4.2178}));
  fetches.push(fetchWx({id:'restbay',     lat:51.4878, lon:-3.7127}));

  // Waves: Stormglass (uses 10 requests/day — 3 spots = 3 requests)
  fetches.push(fetchSG({id:'saunton_kite',lat:51.1059, lon:-4.2178}));
  fetches.push(fetchSG({id:'restbay',     lat:51.4878, lon:-3.7127}));
  // Weston wave data not needed for scoring (kite) but nice for popup
  fetches.push(fetchSG({id:'weston',      lat:51.346,  lon:-2.9878}));

  // Tides: ADMIRALTY via proxy
  fetches.push(fetchTides('weston',  AD_STATIONS.weston));
  fetches.push(fetchTides('saunton', AD_STATIONS.saunton));
  fetches.push(fetchTides('restbay', AD_STATIONS.restbay));

  Promise.all(fetches).then(function(){
    // Share Saunton wx/sg across kite and sup
    wxData['saunton_sup']=wxData['saunton_kite'];
    sgData['saunton_sup']=sgData['saunton_kite'];
    btn.disabled=false; btn.textContent='↻ Refresh';
    if(!Object.keys(wxData).some(function(k){return wxData[k]!=null;})){
      document.getElementById('main').innerHTML='<div class="state-box err">Could not load forecast. Check your connection.<br><span class="retry-btn" onclick="init()">Try again</span></div>';
      return;
    }
    buildComp(); render();
  });
}
init();
</script>
