<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Planner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#111;min-height:100vh}
  .page{max-width:1060px;margin:0 auto;padding:22px 12px 48px}
  .hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
  .hdr h1{font-size:21px;font-weight:700;letter-spacing:-0.3px}
  .hdr p{font-size:12px;color:#888;margin-top:3px}
  .updated{font-size:11px;color:#bbb;margin-top:4px}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
  .refresh-btn{padding:8px 16px;font-size:12px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#444;white-space:nowrap}
  .refresh-btn:hover{background:#f5f5f5}
  .refresh-btn:disabled{opacity:0.5;cursor:default}
  .sg-btn{padding:8px 16px;font-size:12px;border:1px solid #d97706;border-radius:8px;cursor:pointer;background:#fffbeb;color:#92400e;white-space:nowrap;font-weight:600}
  .sg-btn:hover{background:#fef3c7}
  .sg-btn:disabled{opacity:0.5;cursor:default}
  .sg-btn.loaded{background:#f0fdf4;border-color:#059669;color:#065f46}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#777}
  .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .leg-div{width:1px;height:14px;background:#ddd}
  .matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{border-collapse:separate;border-spacing:4px;width:100%;min-width:640px}
  thead th{padding:0}
  .th-spacer{width:152px;min-width:132px}
  .th-day{text-align:center;padding:0 2px 10px;min-width:84px}
  .th-day-label{font-size:13px;font-weight:600;color:#111}
  .th-day-date{font-size:11px;color:#aaa;margin-top:2px}
  .th-day.is-today .th-day-label{color:#2563eb}
  .th-day.is-today .th-day-date{color:#93c5fd}
  .spot-row td{padding:2px}
  .spot-label{background:#fff;border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;justify-content:center;height:100%;min-height:88px}
  .spot-label-name{font-size:12px;font-weight:600;line-height:1.3}
  .spot-label-region{font-size:10px;color:#999;margin-top:2px}
  .activity-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;margin-top:4px;font-weight:600}
  .pill-kite{background:#dbeafe;color:#1e40af}
  .pill-sup{background:#d1fae5;color:#065f46}
  .score-cell{background:#fff;border-radius:10px;padding:9px 5px;text-align:center;cursor:pointer;transition:transform 0.12s ease,box-shadow 0.12s ease;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:88px;-webkit-tap-highlight-color:transparent;position:relative}
  .score-cell:hover,.score-cell:active{transform:scale(1.05);box-shadow:0 4px 14px rgba(0,0,0,0.13);z-index:2}
  .score-cell.is-today{outline:2px solid #93c5fd;outline-offset:-2px}
  .sc-score{font-size:24px;font-weight:800;line-height:1}
  .sc-no{font-size:11px;font-weight:700;color:#dc2626;line-height:1}
  .sc-no-reason{font-size:9px;color:#fca5a5;margin-top:2px;line-height:1.2;max-width:68px;text-align:center}
  .sc-bar{width:34px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
  .sc-fill{height:100%;border-radius:2px}
  .sc-wind{font-size:10px;color:#bbb;margin-top:1px;white-space:nowrap}
  .sc-dir{font-size:10px;font-weight:700;margin-top:1px}
  .band-epic{background:#f0fdf4}.band-epic .sc-score{color:#059669}.band-epic .sc-fill{background:#059669}
  .band-good{background:#eff6ff}.band-good .sc-score{color:#2563eb}.band-good .sc-fill{background:#2563eb}
  .band-ok{background:#fffbeb}.band-ok .sc-score{color:#d97706}.band-ok .sc-fill{background:#d97706}
  .band-poor{background:#fafafa}.band-poor .sc-score{color:#ccc}.band-poor .sc-fill{background:#ddd}
  .band-no{background:#fff5f5}
  .dir-good{color:#059669}.dir-ok{color:#d97706}.dir-bad{color:#dc2626}.dir-neutral{color:#bbb}
  .section-row td{padding:10px 4px 2px;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.5px}
  .pop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
  .pop-overlay.show{display:flex}
  @media(min-width:520px){.pop-overlay{align-items:center;padding:20px}}
  .popover{background:#fff;border-radius:20px 20px 0 0;padding:18px 18px 36px;width:100%;max-width:460px;animation:slideUp 0.2s ease;overflow-y:auto;max-height:92vh}
  @media(min-width:520px){.popover{border-radius:16px;padding:22px;max-height:88vh}}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .pop-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
  @media(min-width:520px){.pop-handle{display:none}}
  .pop-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
  .pop-title{font-size:16px;font-weight:700}
  .pop-subtitle{font-size:12px;color:#999;margin-top:2px}
  .pop-close{background:#f0f0f0;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;color:#888;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px}
  .pop-score-row{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0}
  .pop-score-num{font-size:54px;font-weight:800;line-height:1}
  .pop-score-label{font-size:13px;font-weight:600;padding:5px 12px;border-radius:8px}
  .label-epic{background:#f0fdf4;color:#059669}
  .label-good{background:#eff6ff;color:#2563eb}
  .label-ok{background:#fffbeb;color:#d97706}
  .label-poor{background:#fafafa;color:#aaa;border:1px solid #eee}
  .label-no{background:#fff5f5;color:#dc2626;border:1px solid #fecaca}
  .pop-no-banner{background:#fff5f5;border:1px solid #fecaca;border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13px;color:#dc2626;line-height:1.5}
  .pop-section{margin-bottom:10px}
  .pop-section-title{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .pop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
  .pop-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
  .pop-cell{background:#f7f7f7;border-radius:10px;padding:9px 10px}
  .pop-cell.flag-good{background:#f0fdf4}
  .pop-cell.flag-warn{background:#fffbeb}
  .pop-cell.flag-bad{background:#fff5f5}
  .pop-cell-label{font-size:10px;color:#aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px}
  .pop-cell-val{font-size:14px;font-weight:700;color:#111}
  .pop-cell-sub{font-size:11px;color:#bbb;margin-top:2px}
  .score-breakdown{background:#f7f7f7;border-radius:10px;padding:10px 12px;margin-bottom:10px}
  .sb-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:4px 0;border-bottom:1px solid #efefef}
  .sb-row:last-child{border-bottom:none}
  .sb-label{color:#666;flex:1;padding-right:8px}
  .sb-note{color:#bbb;font-size:10px;display:block;margin-top:1px}
  .sb-val{font-weight:600;font-size:11px;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
  .sb-epic{background:#f0fdf4;color:#059669}
  .sb-good{background:#eff6ff;color:#2563eb}
  .sb-ok{background:#fffbeb;color:#d97706}
  .sb-poor{background:#fafafa;color:#aaa;border:1px solid #eee}
  .sb-no{background:#fff5f5;color:#dc2626}
  .tide-wrap{background:#f7f7f7;border-radius:10px;padding:12px 13px;margin-bottom:10px}
  .tide-events{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
  .tide-event{font-size:12px;padding:4px 10px;border-radius:6px;font-weight:600}
  .tide-hw{background:#dbeafe;color:#1e40af}
  .tide-lw{background:#fef3c7;color:#92400e}
  .tide-hw.tide-good{background:#bbf7d0;color:#065f46}
  .tide-hw.tide-bad{background:#fecaca;color:#991b1b}
  .tide-link{display:flex;align-items:center;justify-content:center;padding:9px 14px;background:#1e40af;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;margin-top:10px}
  .tide-link:hover{background:#1d3a8a}
  .wave-source-note{font-size:11px;color:#aaa;font-style:italic;margin-top:4px}
  .pop-verdict{font-size:13px;color:#555;background:#f7f7f7;border-radius:10px;padding:11px 13px;line-height:1.65;margin-top:4px}
  .state-box{padding:48px 20px;text-align:center;color:#999;font-size:14px;line-height:1.8}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#888;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:#c00}
  .retry-btn{margin-top:14px;display:inline-block;padding:8px 20px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;font-size:13px}
  .src{font-size:11px;color:#ccc;margin-top:18px;text-align:right}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div>
      <h1>Activity Planner</h1>
      <p>Kitesurfing &amp; Paddleboarding — 7-day forecast</p>
      <div class="updated" id="updatedAt"></div>
    </div>
    <div class="btn-row">
      <button class="sg-btn" id="sgBtn" onclick="loadStormglass()">Load accurate wave data</button>
      <button class="refresh-btn" id="refreshBtn" onclick="init()">↻ Refresh</button>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#059669"></div>Epic (8–10)</div>
    <div class="leg"><div class="leg-dot" style="background:#2563eb"></div>Good (6–7)</div>
    <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Fair (4–5)</div>
    <div class="leg"><div class="leg-dot" style="background:#ccc"></div>Poor (&lt;4)</div>
    <div class="leg"><div class="leg-dot" style="background:#fca5a5"></div>NO-GO</div>
    <div class="leg-div"></div>
    <div class="leg" style="color:#bbb">· tap for detail</div>
  </div>
  <div id="main" class="matrix-wrap">
    <div class="state-box"><span class="spin"></span>Loading forecast…</div>
  </div>
  <p class="src" id="srcLine">Wind: Open-Meteo UKMO · Waves: Open-Meteo Marine · Tides: ADMIRALTY UKHO</p>
</div>

<div class="pop-overlay" id="popOverlay" onclick="handleOverlayClick(event)">
  <div class="popover" id="popover">
    <div class="pop-handle"></div>
    <div class="pop-top">
      <div><div class="pop-title" id="popTitle"></div><div class="pop-subtitle" id="popSubtitle"></div></div>
      <button class="pop-close" onclick="closePop()">×</button>
    </div>
    <div class="pop-score-row">
      <div class="pop-score-num" id="popScoreNum"></div>
      <div class="pop-score-label" id="popScoreLabel"></div>
    </div>
    <div id="popNoBanner"></div>
    <div class="pop-section"><div class="pop-section-title">Score breakdown</div><div class="score-breakdown" id="popBreakdown"></div></div>
    <div class="pop-section">
      <div class="pop-section-title">Wind <span id="popWindNote" style="font-weight:400;color:#888;font-size:10px;text-transform:none;letter-spacing:0;font-style:italic"></span></div>
      <div class="pop-grid" id="popWind"></div>
    </div>
    <div class="pop-section"><div class="pop-section-title">Conditions</div><div class="pop-grid" id="popConditions"></div></div>
    <div class="pop-section"><div class="pop-section-title">Waves &amp; swell</div><div class="pop-grid-3" id="popWaves"></div><div class="wave-source-note" id="popWaveNote"></div></div>
    <div class="pop-section"><div class="pop-section-title">Tides — ADMIRALTY</div><div class="tide-wrap" id="popTides"></div></div>
    <div class="pop-verdict" id="popVerdict"></div>
  </div>
</div>

<script>
var PROXY  = 'https://restless-voice-367a.james-gareh.workers.dev';
var AD_KEY = 'c0f36924b48c4d0b9de9df5c1eae0200';

var EASYTIDE = {
  weston:'https://easytide.admiralty.co.uk/?PortID=0527',
  saunton_kite:'https://easytide.admiralty.co.uk/?PortID=0535',
  saunton_sup:'https://easytide.admiralty.co.uk/?PortID=0535',
  restbay:'https://easytide.admiralty.co.uk/?PortID=0512'
};
var AD_STATIONS = {weston:'0527',saunton:'0535',restbay:'0512'};

var SPOTS=[
  {id:'weston',      name:'Weston-super-Mare',region:'Weston',       activity:'kite',lat:51.346, lon:-2.9878,scoring:'weston'},
  {id:'saunton_kite',name:'Saunton Sands',    region:'Saunton — Kite',   activity:'kite',lat:51.1059,lon:-4.2178,scoring:'saunton_kite'},
  {id:'saunton_sup', name:'Saunton Sands',    region:'Saunton — SUP',    activity:'sup', lat:51.1059,lon:-4.2178,scoring:'saunton_sup'},
  {id:'restbay',     name:'Rest Bay Porthcawl',region:'Rest Bay',   activity:'sup', lat:51.4878,lon:-3.7127,scoring:'restbay'}
];

var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var WX_CODES={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm'};
var WX_ICONS={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️'};

// State
var wxData={},marineData={},sgData={},tideData={},comp={};
var sgLoaded=false;
var currentPopSid=null,currentPopDi=null;

// Helpers
function toMph(k){return k!=null?k*0.621371:null;}
function mToFt(m){return m!=null?m*3.281:null;}
function d2dir(d){if(d==null)return'—';var a=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return a[Math.round(d/22.5)%16];}
function bft(k){if(!k||k<2)return'Calm';if(k<20)return'Light';if(k<39)return'Moderate';if(k<62)return'Strong';return'Gale+';}
function avgArr(arr,i,n){if(!arr)return null;var sl=arr.slice(i,i+n).filter(function(v){return v!=null;});return sl.length?sl.reduce(function(a,b){return a+b;},0)/sl.length:null;}
function avgIdx(arr,idx){if(!arr||!idx||!idx.length)return null;var v=idx.map(function(i){return arr[i];}).filter(function(v){return v!=null;});return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null;}
function estimateDusk(lat,di){var d=new Date();d.setDate(d.getDate()+di);var s=new Date(d.getFullYear(),0,0);var doy=Math.round((d-s)/86400000);var B=(360/365)*(doy-81)*Math.PI/180;var decl=23.45*Math.sin(B)*Math.PI/180;var latR=lat*Math.PI/180;var ha=Math.acos(-Math.tan(latR)*Math.tan(decl))*180/Math.PI;return Math.round((12+ha/15)*60);}
function minsToTime(m){var h=Math.floor(m/60),mn=m%60;return h.toString().padStart(2,'0')+':'+(mn<10?'0':'')+mn;}
function isBST(){var d=new Date();return d.getTimezoneOffset()<Math.max(new Date(d.getFullYear(),0,1).getTimezoneOffset(),new Date(d.getFullYear(),6,1).getTimezoneOffset());}

function scoreTempWx(airTemp,wxCode){
  var tb=airTemp!=null?(airTemp>=15?10:airTemp>=10?5:0):0;
  var wb=0,wn='';
  if(wxCode!=null){if(wxCode<=2){wb=5;wn='Clear';}else if(wxCode===3){wb=4;wn='Overcast';}else if(wxCode>=51&&wxCode<=55){wb=2;wn='Light drizzle';}else if(wxCode>=61&&wxCode<=63){wb=1;wn='Light rain';}else if(wxCode===65||wxCode>=80){wb=0;wn='Heavy rain';}else{wb=3;wn=WX_CODES[wxCode]||'';}}
  return{score:Math.min(15,tb+wb),max:15,note:airTemp!=null?Math.round(airTemp)+'°C'+(wn?' · '+wn:''):wn};
}

function findNearestLW(tideEvs,refMins){
  var best=null,bestD=9999;
  (tideEvs||[]).filter(function(e){return e.type==='LW';}).forEach(function(ev){
    var d=Math.abs(ev.timeMins-(refMins||720));
    if(d<bestD){bestD=d;best=ev;}
  });
  return best?{ev:best,diff:bestD}:null;
}

function windAt(wx,indices){
  return{ws:avgIdx(wx.wsArr,indices),wd:avgIdx(wx.wdArr,indices),gust:avgIdx(wx.gustArr,indices)};
}

// Get wave data — prefer Stormglass if loaded, fall back to Open-Meteo marine
function getWaves(spotId,di){
  // Check Stormglass
  var sgKey=spotId.startsWith('saunton')?'saunton':spotId;
  if(sgLoaded&&sgData[sgKey]&&sgData[sgKey].hours){
    var json=sgData[sgKey];
    var d=new Date();d.setDate(d.getDate()+di);d.setHours(13,0,0,0);
    var tgt=d.toISOString().substring(0,13);
    var hour=null;
    json.hours.forEach(function(h){if(h.time&&h.time.substring(0,13)===tgt)hour=h;});
    if(!hour){var ds=d.toISOString().split('T')[0];var dh=json.hours.filter(function(h){return h.time&&h.time.startsWith(ds);});if(dh.length)hour=dh[Math.floor(dh.length/2)];}
    if(hour){
      function v(k){var x=hour[k];if(!x)return null;return x.sg!=null?x.sg:x.noaa!=null?x.noaa:x.icon!=null?x.icon:null;}
      return{waveHeight:v('waveHeight'),wavePeriod:v('wavePeriod'),waveDir:v('waveDirection'),swellHeight:v('swellHeight'),swellPeriod:v('swellPeriod'),swellDir:v('swellDirection'),seaTemp:v('waterTemperature'),source:'Stormglass'};
    }
  }
  // Fall back to Open-Meteo marine
  var marKey=spotId.startsWith('saunton')?'saunton_kite':spotId;
  var json=marineData[marKey];
  if(!json||!json.hourly)return{waveHeight:null,wavePeriod:null,waveDir:null,swellHeight:null,swellPeriod:null,swellDir:null,seaTemp:null,source:'Open-Meteo (estimated)'};
  var h=json.hourly,mid=di*24+11;
  return{
    waveHeight:avgArr(h.wave_height,mid,3),
    wavePeriod:avgArr(h.wave_period,mid,3),
    waveDir:h.wave_direction&&h.wave_direction[mid]!=null?h.wave_direction[mid]:null,
    swellHeight:avgArr(h.swell_wave_height,mid,3),
    swellPeriod:null,
    swellDir:h.swell_wave_direction&&h.swell_wave_direction[mid]!=null?h.swell_wave_direction[mid]:null,
    seaTemp:h.sea_surface_temperature&&h.sea_surface_temperature[mid]!=null?h.sea_surface_temperature[mid]:null,
    source:'Open-Meteo (estimated)'
  };
}

// Wave height in feet — use swellHeight for Saunton kite, waveHeight for SUP/RestBay
// Returns swell direction multiplier for a spot
// Multiplier reduces effective wave height when swell is from a blocked direction
function swellDirMultiplier(swellDir, spotType){
  // Multipliers calibrated against Stormglass vs Surfline comparison (Apr 2026)
  // Stormglass raw 6-7ft vs Surfline 2-3ft on blocked days => ~0.4 needed at worst
  // Stormglass raw 3-4ft vs Surfline 2-3ft on good days => ~0.75-0.9 at best
  var dir=d2dir(swellDir);
  if(spotType==='saunton'){
    // Saunton faces W
    if(['W','WSW','WNW','SW','NW'].indexOf(dir)>=0) return 0.85; // full exposure but still some model overestimate
    if(['SSW','S','NNW'].indexOf(dir)>=0)           return 0.65; // partial
    if(['N','NNE'].indexOf(dir)>=0)                 return 0.45; // mostly blocked
    if(['NE','ENE','E'].indexOf(dir)>=0)            return 0.38; // largely blocked — calibrated to ~2.5ft from 6.5ft raw
    return 0.55; // other
  }
  if(spotType==='restbay'){
    // Rest Bay faces SW
    if(['SW','WSW','W','SSW','S'].indexOf(dir)>=0)  return 0.85; // full exposure
    if(['NW','WNW','SE','SSE'].indexOf(dir)>=0)     return 0.6;  // partial
    if(['N','NNE'].indexOf(dir)>=0)                 return 0.42; // mostly blocked
    if(['NE','ENE','E'].indexOf(dir)>=0)            return 0.38; // largely blocked
    return 0.55; // other
  }
  return 1.0;
}

function waveFtForScoring(waves, scoring){
  var h=(scoring==='saunton_kite'&&waves.swellHeight!=null)?waves.swellHeight:waves.waveHeight;
  var ft=mToFt(h);
  if(ft==null) return null;
  // Apply swell direction multiplier — reduces effective height when swell is blocked
  var spotType=(scoring==='saunton_kite'||scoring==='saunton_sup')?'saunton':(scoring==='restbay'?'restbay':null);
  if(spotType&&waves.swellDir!=null) ft=ft*swellDirMultiplier(waves.swellDir, spotType);
  return ft;
}

// ── SCORING ──────────────────────────────────────────────

function scoreWeston(wx,waves,tideEvs,dusk){
  var noGo=false,noGoReasons=[],bd=[],tot=0,wt=0;
  // 1. TIDE — HW between 09:00 and dusk
  var tideScore=0,tideNote='No tide data',bestHW=null;
  (tideEvs||[]).filter(function(e){return e.type==='HW';}).forEach(function(ev){
    if(bestHW)return;
    if(ev.timeMins>=540&&ev.timeMins<=dusk){bestHW=ev;tideScore=25;tideNote='HW '+ev.localTime+(ev.isApprox?' ~':'');}
  });
  if((tideEvs||[]).filter(function(e){return e.type==='HW';}).length&&!bestHW){
    noGo=true;noGoReasons.push('HW outside 09:00–1hr after dusk window');tideNote='HW outside window — NO-GO';
  }
  bd.push({label:'Tide (HW 09:00–dusk)',score:tideScore,max:25,note:tideNote});tot+=tideScore;wt+=25;

  // Wind at HW ±1hr
  var w={ws:null,wd:null,gust:null},wLabel='midday';
  if(bestHW&&wx){var hi=wx.dayBase+bestHW.hourIdx;var idx=[hi-1,hi,hi+1].filter(function(i){return i>=0&&i<wx.hourlyLen;});w=windAt(wx,idx);wLabel='avg ±1hr of HW '+bestHW.localTime;}
  else if(wx){w=windAt(wx,[wx.middayIdx-1,wx.middayIdx,wx.middayIdx+1]);}
  wx._ws=w.ws;wx._wd=w.wd;wx._gust=w.gust;wx._wLabel=wLabel;

  // 2. WIND DIR
  var dir=d2dir(w.wd),ds=0,dn=dir;
  var vd=['S','SSW','SW','WSW','W','WNW','NW'];
  if(vd.indexOf(dir)===-1){noGo=true;noGoReasons.push('Wind direction '+dir+' outside S–NW — NO-GO');dn=dir+' — outside arc';}
  else if(dir==='SW'){ds=25;dn=dir+' — ideal';}else if(dir==='SSW'||dir==='WSW'){ds=20;dn=dir+' — good';}
  else if(dir==='WNW'||dir==='NW'){ds=15;dn=dir+' — ok';}else{ds=10;dn=dir+' — not so good';}
  bd.push({label:'Wind direction',score:ds,max:25,note:dn});tot+=ds;wt+=25;

  // 3. WIND SPEED
  var mph=toMph(w.ws),ws2=0,wn2=mph!=null?Math.round(mph)+' mph':'—';
  if(mph!=null){if(mph<13){noGo=true;noGoReasons.push('Wind too light ('+Math.round(mph)+' mph, <13mph NO-GO)');ws2=0;wn2=Math.round(mph)+' mph — too light, NO-GO';}else if(mph>=18&&mph<=24){ws2=25;wn2=Math.round(mph)+' mph — ideal';}else if(mph>=14&&mph<18){ws2=18;wn2=Math.round(mph)+' mph — good (light)';}else if(mph>24&&mph<=30){ws2=18;wn2=Math.round(mph)+' mph — good (strong)';}else if(mph>30&&mph<=35){ws2=8;wn2=Math.round(mph)+' mph — strong';}else if(mph>35){ws2=2;wn2=Math.round(mph)+' mph — too strong';}}
  bd.push({label:'Wind speed',score:ws2,max:25,note:wn2});tot+=ws2;wt+=25;

  // 4. TEMP
  var t=scoreTempWx(wx?wx.airTemp:null,wx?wx.wxCode:null);
  bd.push({label:'Temp & weather (info only)',score:0,max:0,note:t.note});// info only — not scored

  return{score:noGo?0:Math.min(10,(tot/wt)*10),noGo:noGo,noGoReasons:noGoReasons,breakdown:bd};
}

function scoreSauntonKite(wx,waves,tideEvs,dusk){
  var noGo=false,noGoReasons=[],bd=[],tot=0,wt=0;
  // 1. WAVE HEIGHT — adjusted for swell direction (multiplier applied to raw height)
  var waveFt=waveFtForScoring(waves,'saunton_kite');
  var swellMult=waves&&waves.swellDir!=null?swellDirMultiplier(waves.swellDir,'saunton'):1;
  var swellDirLabel=waves&&waves.swellDir!=null?d2dir(waves.swellDir)+' swell · '+Math.round(swellMult*100)+'% exposure':'';
  var wvS=0,wvN=waveFt!=null?Math.round(waveFt)+'ft'+(swellMult<0.8?' (dir adj)':''):'—';
  if(waveFt!=null){if(waveFt>5){noGo=true;noGoReasons.push('Waves too big (~'+Math.round(waveFt)+'ft, >5ft NO-GO)');wvS=0;wvN=Math.round(waveFt)+'ft — NO-GO';}else if(waveFt<=3){wvN=Math.round(waveFt)+'ft — good';}else{wvN=Math.round(waveFt)+'ft — just ok';}}else{wvN='No wave data';}
  bd.push({label:'Wave height (info only)',score:0,max:0,note:wvN+(swellDirLabel?' · '+swellDirLabel:'')});// info only — not scored

  // Wind at LW ±1hr
  var lw=findNearestLW(tideEvs,720);
  var w={ws:null,wd:null,gust:null},wLabel='midday';
  if(lw&&wx){var hi=wx.dayBase+lw.ev.hourIdx;var idx=[hi-1,hi,hi+1].filter(function(i){return i>=0&&i<wx.hourlyLen;});w=windAt(wx,idx);wLabel='avg ±1hr of LW '+lw.ev.localTime;}
  else if(wx){w=windAt(wx,[wx.middayIdx-1,wx.middayIdx,wx.middayIdx+1]);}
  wx._ws=w.ws;wx._wd=w.wd;wx._gust=w.gust;wx._wLabel=wLabel;

  // 2. WIND DIR
  var dir=d2dir(w.wd),ds=0,dn=dir;
  if(['E','ENE','NE'].indexOf(dir)>=0){noGo=true;noGoReasons.push(dir+' is offshore — NO-GO');dn=dir+' — offshore, NO-GO';}
  else if(dir==='W'){ds=25;dn=dir+' — ideal';}else if(dir==='WSW'||dir==='WNW'){ds=23;dn=dir+' — ideal (cross-on)';}
  else if(dir==='SW'||dir==='NW'){ds=18;dn=dir+' — good';}else if(['SSW','NNW','N','S'].indexOf(dir)>=0){ds=12;dn=dir+' — ok';}
  else if(['SSE','SE'].indexOf(dir)>=0){ds=8;dn=dir+' — marginal';}else if(dir==='ESE'){ds=3;dn=dir+' — nearly offshore';}else{ds=5;dn=dir;}
  bd.push({label:'Wind direction',score:ds,max:25,note:dn});tot+=ds;wt+=25;

  // 3. WIND SPEED
  var mph=toMph(w.ws),ws2=0,wn2=mph!=null?Math.round(mph)+' mph':'—';
  if(mph!=null){if(mph<13){noGo=true;noGoReasons.push('Wind too light ('+Math.round(mph)+' mph, <13mph NO-GO)');ws2=0;wn2=Math.round(mph)+' mph — too light, NO-GO';}else if(mph>=18&&mph<=24){ws2=20;wn2=Math.round(mph)+' mph — ideal';}else if(mph>=14&&mph<18){ws2=14;wn2=Math.round(mph)+' mph — good (light)';}else if(mph>24&&mph<=30){ws2=14;wn2=Math.round(mph)+' mph — good (strong)';}else if(mph>30&&mph<=35){ws2=6;wn2=Math.round(mph)+' mph — strong';}else if(mph>35){ws2=2;wn2=Math.round(mph)+' mph — too strong';}}
  bd.push({label:'Wind speed',score:ws2,max:20,note:wn2});tot+=ws2;wt+=20;

  // 4. TIDE
  var tS=0,tN='No tide data';
  if(lw){if(lw.diff<=120){tN='Near LW '+lw.ev.localTime+' — ideal';}else if(lw.diff<=240){tN='Approaching LW '+lw.ev.localTime;}else{tN='Far from LW';}}
  bd.push({label:'Tide (info only)',score:0,max:0,note:tN});// info only — not scored

  // 5. SWELL PERIOD
  var sp=waves?waves.swellPeriod||waves.wavePeriod:null;
  var pS=0,pN=sp!=null?sp.toFixed(0)+'s':'—';
  if(sp!=null){if(sp>=12){pS=10;pN=sp.toFixed(0)+'s — excellent';}else if(sp>=9){pS=7;pN=sp.toFixed(0)+'s — good';}else if(sp>=7){pS=4;pN=sp.toFixed(0)+'s — ok';}else{pS=1;pN=sp.toFixed(0)+'s — short';}}else{pS=5;pN='No data';}
  bd.push({label:'Swell period',score:pS,max:10,note:pN});tot+=pS;wt+=10;

  // 6. TEMP
  var t=scoreTempWx(wx?wx.airTemp:null,wx?wx.wxCode:null);
  bd.push({label:'Temp & weather (info only)',score:0,max:0,note:t.note});// info only — not scored

  return{score:noGo?0:Math.min(10,(tot/wt)*10),noGo:noGo,noGoReasons:noGoReasons,breakdown:bd};
}

}

function scoreRestBay(wx,waves,tideEvs,westonTideEvs,dusk){

  if(proxyHW.length){if(nearHT){noGo=true;noGoReasons.push('Within ±1hr of high tide — NO-GO');tN='Near HT — NO-GO';}else if(minDiff>240){tS=20;tN='Well away from HT';}else if(minDiff>120){tS=15;tN='~'+Math.round(minDiff/60)+'hrs from HT';}else{tS=10;tN='~'+Math.round(minDiff/60)+'hr from HT — caution';}}else{tS=10;tN='No tide data (proxy)';}
  bd.push({label:'Tide (no HT ±1hr)',score:tS,max:20,note:tN});tot+=tS;wt+=20;

  else if(wx){w=windAt(wx,[wx.middayIdx-1,wx.middayIdx,wx.middayIdx+1]);}
  wx._ws=w.ws;wx._wd=w.wd;wx._gust=w.gust;wx._wLabel=wLabel;

  var waveFt=mToFt(waves?waves.waveHeight:null);

  if(waveFt!=null){if(waveFt>5){noGo=true;noGoReasons.push('Waves too big (~'+Math.round(waveFt)+'ft)');wvS=0;wvN=Math.round(waveFt)+'ft — NO-GO';}else if(waveFt<2){noGo=true;noGoReasons.push('Waves too small (~'+Math.round(waveFt*10)/10+'ft, <2ft NO-GO)');wvS=0;wvN=Math.round(waveFt*10)/10+'ft — too small';}else if(waveFt<=2.5){wvS=14;wvN=Math.round(waveFt*10)/10+'ft — ok';}else if(waveFt<=3){wvS=20;wvN=Math.round(waveFt*10)/10+'ft — good';}else if(waveFt<=4){wvS=25;wvN=Math.round(waveFt*10)/10+'ft — ideal';}else if(waveFt<=5){wvS=18;wvN=Math.round(waveFt*10)/10+'ft — getting big';}}else{wvS=12;wvN='No wave data';}
  bd.push({label:'Wave height',score:wvS,max:25,note:wvN});tot+=wvS;wt+=25;

  // 3. WIND SPEED
  var mph=toMph(w.ws),ws2=0,wn2=mph!=null?Math.round(mph)+' mph':'—';
  if(mph!=null){if(mph<8){ws2=20;wn2=Math.round(mph)+' mph — calm';}else if(mph<=14){ws2=16;wn2=Math.round(mph)+' mph — light';}else if(mph<=20){ws2=9;wn2=Math.round(mph)+' mph — moderate';}else if(mph<=28){ws2=4;wn2=Math.round(mph)+' mph — strong';}else{ws2=1;wn2=Math.round(mph)+' mph — too strong';}}
  bd.push({label:'Wind speed',score:ws2,max:20,note:wn2});tot+=ws2;wt+=20;

  // 4. WIND DIR
  var dir=d2dir(w.wd),ds=0,dn=dir;
  var onRB=['SW','WSW','W','WNW','NW'];
  var isOnRB=onRB.indexOf(dir)>=0,isStrRB=mph!=null&&mph>15;
  if(isOnRB&&isStrRB){noGo=true;noGoReasons.push('Strong onshore ('+Math.round(mph||0)+'mph '+dir+') — NO-GO');ds=0;dn=dir+' — strong onshore, NO-GO';}
  else if(['NE','ENE','E','N','NNE'].indexOf(dir)>=0){ds=20;dn=dir+' — offshore';}
  else if(['SE','SSE','S','SSW'].indexOf(dir)>=0){ds=15;dn=dir+' — cross';}
  else if(isOnRB&&!isStrRB){ds=8;dn=dir+' — light onshore, ok';}else{ds=12;dn=dir;}
  bd.push({label:'Wind direction',score:Math.round(ds/2),max:10,note:dn});tot+=Math.round(ds/2);wt+=10;

  // 5. TEMP
  var t=scoreTempWx(wx?wx.airTemp:null,wx?wx.wxCode:null);
  bd.push({label:'Temp & weather',score:t.score,max:t.max,note:t.note});tot+=t.score;wt+=t.max;

  return{score:noGo?0:Math.min(10,(tot/wt)*10),noGo:noGo,noGoReasons:noGoReasons,breakdown:bd};
}

// Extract weather arrays for a day
function extractWx(json,di){
  if(!json||!json.hourly)return null;
  var h=json.hourly,b=di*24,mid=b+11;
  return{wsArr:h.wind_speed_10m||null,wdArr:h.wind_direction_10m||null,gustArr:h.wind_gusts_10m||null,
    airTemp:h.temperature_2m&&h.temperature_2m[mid]!=null?h.temperature_2m[mid]:null,
    precip:avgArr(h.precipitation_probability,mid,3),
    wxCode:h.weather_code&&h.weather_code[mid]!=null?h.weather_code[mid]:null,
    middayIdx:mid,hourlyLen:(h.wind_speed_10m||[]).length,dayBase:b,
    _ws:null,_wd:null,_gust:null,_wLabel:''};
}

function getTideEvs(spotId,di){
  var d=new Date();d.setDate(d.getDate()+di);
  var ds=d.toISOString().split('T')[0];
  var key=spotId.startsWith('saunton')?'saunton':spotId;
  var data=tideData[key];
  return (data&&data[ds])||[];
}

function buildComp(){
  comp={};
  SPOTS.forEach(function(sp){
    comp[sp.id]=[];
    var wxJson=sp.id.startsWith('saunton')?wxData['saunton_kite']:wxData[sp.id];
    for(var i=0;i<7;i++){
      var wx=extractWx(wxJson,i);
      if(!wx){comp[sp.id].push(null);continue;}
      wx._ws=null;wx._wd=null;wx._gust=null;wx._wLabel='';
      var waves=getWaves(sp.id,i);
      var tideEvs=getTideEvs(sp.id,i);
      var westonEvs=getTideEvs('weston',i);
      var dusk=estimateDusk(sp.lat,i);
      var result;
      if(sp.scoring==='weston')           result=scoreWeston(wx,waves,tideEvs,dusk);
      else if(sp.scoring==='saunton_kite')result=scoreSauntonKite(wx,waves,tideEvs,dusk);
      else if(sp.scoring==='saunton_sup') result=scoreSauntonSUP(wx,waves,tideEvs,dusk);
      else                                result=scoreRestBay(wx,waves,tideEvs,westonEvs,dusk);
      comp[sp.id].push({
        score:result.score,noGo:result.noGo,noGoReasons:result.noGoReasons,breakdown:result.breakdown,
        _ws:wx._ws,_wd:wx._wd,_gust:wx._gust,_wLabel:wx._wLabel,
        airTemp:wx.airTemp,precip:wx.precip,wxCode:wx.wxCode,
        waves:waves,tideEvs:tideEvs,westonEvs:westonEvs,duskMins:dusk
      });
    }
  });
}

// Fetch functions
function fetchWx(id,lat,lon){
  return new Promise(function(resolve){
    var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
      '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation_probability,weather_code'+
      '&wind_speed_unit=kmh&timezone=Europe%2FLondon&forecast_days=7&models=ukmo_seamless';
    fetch(url).then(function(r){return r.json();}).then(function(j){wxData[id]=j;resolve();}).catch(function(){wxData[id]=null;resolve();});
  });
}
function fetchMarine(id,lat,lon){
  return new Promise(function(resolve){
    var url='https://marine-api.open-meteo.com/v1/marine?latitude='+lat+'&longitude='+lon+
      '&hourly=wave_height,wave_period,wave_direction,swell_wave_height,swell_wave_direction,sea_surface_temperature'+
      '&timezone=Europe%2FLondon&forecast_days=7';
    fetch(url).then(function(r){return r.json();}).then(function(j){marineData[id]=j;resolve();}).catch(function(){marineData[id]=null;resolve();});
  });
}
function fetchTides(key,stationId){
  return new Promise(function(resolve){
    var adUrl='https://admiraltyapi.azure-api.net/uktidalapi/api/V1/Stations/'+stationId+'/TidalEvents?duration=7';
    fetch(PROXY+'?url='+encodeURIComponent(adUrl))
      .then(function(r){return r.json();})
      .then(function(events){
        var byDate={},bst=isBST()?60:0;
        (events||[]).forEach(function(ev){
          var gmt=new Date(ev.DateTime+'Z');
          var loc=new Date(gmt.getTime()+bst*60000);
          var ds=gmt.toISOString().split('T')[0];
          var h=loc.getUTCHours().toString().padStart(2,'0'),m=loc.getUTCMinutes().toString().padStart(2,'0');
          if(!byDate[ds])byDate[ds]=[];
          byDate[ds].push({type:ev.EventType==='HighWater'?'HW':'LW',height:ev.Height,localTime:h+':'+m,timeMins:loc.getUTCHours()*60+loc.getUTCMinutes(),hourIdx:loc.getUTCHours(),isApprox:ev.IsApproximateTime});
        });
        tideData[key]=byDate;resolve();
      }).catch(function(){tideData[key]=null;resolve();});
  });
}
function fetchSG(key,lat,lon){
  return new Promise(function(resolve){
    // Cache in localStorage by spot + today's date — free refreshes all day
    var today=new Date().toISOString().split('T')[0]; // UTC date — consistent across devices/timezones
    var cacheKey='sg_'+key+'_'+today;
    try{
      var cached=localStorage.getItem(cacheKey);
      if(cached){
        var parsed=JSON.parse(cached);
        // Validate it has actual hourly wave data
        if(parsed&&parsed.hours&&parsed.hours.length>0){
          sgData[key]=parsed;
          return resolve();
        }
      }
    }catch(e){}
    // Not cached — fetch via proxy (uses 1 of 10 daily requests)
    var now=new Date(),start=new Date(now);start.setHours(0,0,0,0);
    var end=new Date(start);end.setDate(end.getDate()+7);
    var sgUrl='https://api.stormglass.io/v2/weather/point?lat='+lat+'&lng='+lon+
      '&params=waveHeight,wavePeriod,waveDirection,swellHeight,swellPeriod,swellDirection,waterTemperature'+
      '&start='+start.toISOString()+'&end='+end.toISOString();
    fetch(PROXY+'?url='+encodeURIComponent(sgUrl))
      .then(function(r){return r.json();})
      .then(function(j){
        sgData[key]=j;
        try{
          // Clear old cache entries for this spot
          var keysToRemove=[];
          for(var i=0;i<localStorage.length;i++){
            var k=localStorage.key(i);
            if(k&&k.startsWith('sg_'+key+'_')&&k!==cacheKey)keysToRemove.push(k);
          }
          keysToRemove.forEach(function(k){localStorage.removeItem(k);});
          // Only cache if we got valid data
          if(j&&j.hours&&j.hours.length>0){
            localStorage.setItem(cacheKey,JSON.stringify(j));
          }
        }catch(e){}
        resolve();
      })
      .catch(function(){sgData[key]=null;resolve();});
  });
}

// Render
function dayInfo(i){var d=new Date();d.setDate(d.getDate()+i);return{short:i===0?'Today':i===1?'Tmrw':DAYS[d.getDay()],long:i===0?'Today':i===1?'Tomorrow':DAYS[d.getDay()],date:d.getDate()+' '+MONTHS[d.getMonth()]};}
function band(s,ng){if(ng)return'band-no';if(s>=8)return'band-epic';if(s>=6)return'band-good';if(s>=4)return'band-ok';return'band-poor';}
function bandColor(s,ng){if(ng)return'#dc2626';if(s>=8)return'#059669';if(s>=6)return'#2563eb';if(s>=4)return'#d97706';return'#bbb';}
function bandLabel(s,ng){if(ng)return['NO-GO','label-no'];if(s>=8)return['Epic','label-epic'];if(s>=6)return['Good','label-good'];if(s>=4)return['Fair','label-ok'];return['Poor','label-poor'];}
function sbCls(sc,mx){if(sc===0&&mx>0)return'sb-no';var p=sc/mx;if(p>=0.85)return'sb-epic';if(p>=0.6)return'sb-good';if(p>=0.3)return'sb-ok';return'sb-poor';}
function dirCls(sid,dir){
  if(sid==='weston'){if(['SW','SSW','WSW'].indexOf(dir)>=0)return'dir-good';if(['WNW','NW','S','W'].indexOf(dir)>=0)return'dir-ok';return'dir-bad';}
  if(sid==='saunton_kite'){if(['W','WSW','WNW'].indexOf(dir)>=0)return'dir-good';if(['E','ENE','NE'].indexOf(dir)>=0)return'dir-bad';return'dir-ok';}
  if(['NE','ENE','E','N','NNE'].indexOf(dir)>=0)return'dir-good';
  if(['SW','W','WSW','WNW','NW'].indexOf(dir)>=0)return'dir-bad';
  return'dir-ok';
}

function render(){
  var html='<table><thead><tr><th class="th-spacer"></th>';
  for(var d=0;d<7;d++){var inf=dayInfo(d);html+='<th class="th-day'+(d===0?' is-today':'')+'"><div class="th-day-label">'+inf.short+'</div><div class="th-day-date">'+inf.date+'</div></th>';}
  html+='</tr></thead><tbody>';
  var sections=[{label:'Weston-super-Mare',ids:['weston']},{label:'Saunton Sands',ids:['saunton_kite','saunton_sup']},{label:'Rest Bay, Porthcawl',ids:['restbay']}];
  sections.forEach(function(sec){
    html+='<tr class="section-row"><td colspan="8">'+sec.label+'</td></tr>';
    sec.ids.forEach(function(sid){
      var sp=SPOTS.filter(function(s){return s.id===sid;})[0];if(!sp)return;
      var pc=sp.activity==='kite'?'pill-kite':'pill-sup',pl=sp.activity==='kite'?'Kitesurfing':'Paddleboarding';
      html+='<tr class="spot-row"><td><div class="spot-label"><div class="spot-label-name">'+sp.region+'</div><span class="activity-pill '+pc+'">'+pl+'</span></div></td>';
      for(var d=0;d<7;d++){
        var c=comp[sid]&&comp[sid][d],tc=d===0?' is-today':'';
        if(!c){html+='<td><div class="score-cell band-poor'+tc+'"><div class="sc-score" style="font-size:14px">—</div></div></td>';continue;}
        var wxIcon=c.wxCode!=null?(WX_ICONS[c.wxCode]||''):'';
        var dir=d2dir(c._wd),rws=toMph(c._ws)!=null?Math.round(toMph(c._ws)):0;
        if(c.noGo){
          var reason=c.noGoReasons&&c.noGoReasons[0]?c.noGoReasons[0].split('—')[0].trim():'Check conditions';
          if(reason.length>30)reason=reason.substring(0,28)+'…';
          html+='<td><div class="score-cell band-no'+tc+'" onclick="openPop(\''+sid+'\','+d+')">'+
            (wxIcon?'<div style="font-size:11px">'+wxIcon+'</div>':'')+
            '<div class="sc-no">NO-GO</div><div class="sc-no-reason">'+reason+'</div></div></td>';
        } else {
          html+='<td><div class="score-cell '+band(c.score,false)+tc+'" onclick="openPop(\''+sid+'\','+d+')">'+
            (wxIcon?'<div style="font-size:12px;line-height:1">'+wxIcon+'</div>':'')+
            '<div class="sc-score">'+c.score.toFixed(1)+'</div>'+
            '<div class="sc-bar"><div class="sc-fill" style="width:'+Math.round(c.score*10)+'%"></div></div>'+
            (sid==='saunton_sup'||sid==='restbay'?
              '<div class="sc-wind">'+(c.waves&&c.waves.waveHeight!=null?Math.round(mToFt(c.waves.waveHeight))+'ft':'—ft')+'</div>'
            : '<div class="sc-wind">'+rws+' mph</div>')+
            '<div class="sc-dir '+dirCls(sid,dir)+'">'+dir+'</div></div></td>';
        }
      }
      html+='</tr>';
    });
  });
  html+='</tbody></table>';
  document.getElementById('main').innerHTML=html;
  var now=new Date();
  document.getElementById('updatedAt').textContent='Updated '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('srcLine').textContent=sgLoaded?
    'Wind: Open-Meteo UKMO · Waves (Saunton/Rest Bay): Stormglass · Tides: ADMIRALTY UKHO':
    'Wind: Open-Meteo UKMO · Waves: Open-Meteo Marine (estimated) · Tides: ADMIRALTY UKHO';
}

function pcell(l,v,s,f){return'<div class="pop-cell'+(f?' flag-'+f:'')+'"><div class="pop-cell-label">'+l+'</div><div class="pop-cell-val">'+v+'</div>'+(s?'<div class="pop-cell-sub">'+s+'</div>':'')+'</div>';}

function openPop(sid,di){
  currentPopSid=sid;currentPopDi=di;
  var sp=SPOTS.filter(function(s){return s.id===sid;})[0];
  var c=comp[sid]&&comp[sid][di];if(!c)return;
  var inf=dayInfo(di),sc=c.score,bl=bandLabel(sc,c.noGo);
  document.getElementById('popTitle').textContent=sp.name+' — '+(sp.activity==='kite'?'Kitesurfing':'Paddleboarding');
  document.getElementById('popSubtitle').textContent=inf.long+' · '+inf.date;
  var sn=document.getElementById('popScoreNum');sn.textContent=c.noGo?'—':sc.toFixed(1);sn.style.color=bandColor(sc,c.noGo);
  var sl=document.getElementById('popScoreLabel');sl.textContent=bl[0];sl.className='pop-score-label '+bl[1];
  var nb=document.getElementById('popNoBanner');
  nb.innerHTML=c.noGo&&c.noGoReasons&&c.noGoReasons.length?'<div class="pop-no-banner"><strong>NO-GO:</strong><br>'+c.noGoReasons.join('<br>')+'</div>':'';
  // Breakdown
  var bk='';
  if(c.breakdown&&c.breakdown.length)c.breakdown.forEach(function(r){
    var valHtml=r.max===0
      ?'<span class="sb-val" style="background:#f0f0f0;color:#999;font-style:italic">info</span>'
      :'<span class="sb-val '+sbCls(r.score,r.max)+'">'+r.score+'/'+r.max+'</span>';
    bk+='<div class="sb-row"><span class="sb-label">'+r.label+'<span class="sb-note">'+r.note+'</span></span>'+valHtml+'</div>';
  });
  else bk='<div style="font-size:12px;color:#bbb">No breakdown</div>';
  document.getElementById('popBreakdown').innerHTML=bk;
  // Wind
  var dir=d2dir(c._wd),mph=toMph(c._ws),gmph=toMph(c._gust);
  var diff=mph!=null&&gmph!=null?Math.round(gmph-mph):null;
  var wf=mph!=null?(mph>=18&&mph<=24?'good':mph>=14&&mph<=30?'warn':'bad'):'';
  document.getElementById('popWindNote').textContent=c._wLabel?'('+c._wLabel+')':'';
  document.getElementById('popWind').innerHTML=
    pcell('Avg wind',mph!=null?Math.round(mph)+' mph':'—',dir+' · '+bft(c._ws||0),wf)+
    pcell('Gusts',gmph!=null?Math.round(gmph)+' mph':'—',diff!=null?'+'+diff+' mph vs avg':'','');
  // Conditions
  var wxd=c.wxCode!=null?((WX_ICONS[c.wxCode]||'')+' '+(WX_CODES[c.wxCode]||'')):'—';
  var at=c.airTemp!=null?Math.round(c.airTemp)+'°C':'—',tf=c.airTemp!=null?(c.airTemp>=15?'good':c.airTemp>=10?'warn':'bad'):'';
  document.getElementById('popConditions').innerHTML=
    pcell('Weather',wxd,'','')+
    pcell('Air temp',at,'Rain: '+(c.precip!=null?Math.round(c.precip)+'%':'—'),tf)+
    pcell('Sea temp',c.waves&&c.waves.seaTemp!=null?Math.round(c.waves.seaTemp)+'°C':'—','','')+
    pcell('Rain chance',c.precip!=null?Math.round(c.precip)+'%':'—','','');
  // Waves
  var w=c.waves||{};
  if(sid==='weston'){
    document.getElementById('popWaves').innerHTML='<div style="font-size:12px;color:#aaa;padding:4px 0">Wave height not scored at Weston — wind is the key factor.</div>';
    document.getElementById('popWaveNote').textContent='';
  } else {
    var spotType2=(sid==='saunton_kite'||sid==='saunton_sup')?'saunton':(sid==='restbay'?'restbay':null);
    var popMult=spotType2&&w.swellDir!=null?swellDirMultiplier(w.swellDir,spotType2):1.0;
    var whFt=mToFt(w.waveHeight)!=null?mToFt(w.waveHeight)*popMult:null;
    var swFt=mToFt(w.swellHeight)!=null?mToFt(w.swellHeight)*popMult:null;
    document.getElementById('popWaves').innerHTML=
      pcell('Wave height',whFt!=null?Math.round(whFt)+'ft':'—',w.waveHeight!=null?'('+w.waveHeight.toFixed(2)+'m)':'')+
      pcell('Swell',swFt!=null?Math.round(swFt)+'ft':'—',w.swellPeriod!=null?w.swellPeriod.toFixed(0)+'s period':'')+
      pcell('Swell dir',d2dir(w.swellDir),'','');
    document.getElementById('popWaveNote').textContent='Source: '+(w.source||'—');
  }
  // Tides
  var dusk=c.duskMins||1080;
  var tHTML='';
  if(sid==='weston')tHTML+='<div style="font-size:11px;color:#aaa;margin-bottom:8px">HW window: 09:00–'+minsToTime(dusk+60)+' (1hr after est. dusk)</div>';
  if(sid==='restbay')tHTML+='<div style="font-size:11px;color:#aaa;margin-bottom:8px">Tide proxy: Weston · NO-GO ±1hr of HT</div>';
  var dispEvs=sid==='restbay'?c.westonEvs:c.tideEvs;
  if(dispEvs&&dispEvs.length){
    tHTML+='<div class="tide-events">';
    dispEvs.forEach(function(ev){
      var isHW=ev.type==='HW',hc='';
      if(isHW&&sid==='weston')hc=(ev.timeMins>=540&&ev.timeMins<=dusk+60)?' tide-good':' tide-bad';
      tHTML+='<span class="tide-event '+(isHW?'tide-hw':'tide-lw')+hc+'">'+(ev.isApprox?'~':'')+ev.type+' '+ev.localTime+' ('+ev.height.toFixed(1)+'m)</span>';
    });
    tHTML+='</div>';
    var hwH=dispEvs.filter(function(e){return e.type==='HW';}),lwH=dispEvs.filter(function(e){return e.type==='LW';});
    if(hwH.length&&lwH.length){
      var range=(Math.max.apply(null,hwH.map(function(e){return e.height;}))-Math.min.apply(null,lwH.map(function(e){return e.height;}))).toFixed(1);
      tHTML+='<div style="font-size:12px;color:#555;margin-top:6px">Tidal range: <strong>'+range+'m</strong>'+(sid==='weston'?' — plan launch ±2hrs of HW':'')+'</div>';
    }
  } else{tHTML+='<div style="font-size:12px;color:#bbb;margin-top:4px">Tide data loading…</div>';}
  tHTML+='<a class="tide-link" href="'+EASYTIDE[sid]+'" target="_blank">View official ADMIRALTY tide times ↗</a>';
  document.getElementById('popTides').innerHTML=tHTML;
  // Verdict
  var parts=[];
  if(c.noGo)parts.push('Does not meet minimum requirements.');
  else{if(sc>=8)parts.push('Excellent — all key factors look good.');else if(sc>=6)parts.push('Good conditions — worth going.');else if(sc>=4)parts.push('Borderline — check details.');else parts.push('Poor overall.');
  if(c.breakdown)c.breakdown.forEach(function(r){if(r.score<r.max*0.4)parts.push(r.label+': '+r.note+'.');});}
  document.getElementById('popVerdict').textContent=parts.join(' ');
  document.getElementById('popOverlay').classList.add('show');
}

function closePop(){document.getElementById('popOverlay').classList.remove('show');}
function handleOverlayClick(e){if(e.target===document.getElementById('popOverlay'))closePop();}

function loadStormglass(){
  var btn=document.getElementById('sgBtn');
  btn.disabled=true;btn.textContent='Loading accurate waves…';
  Promise.all([
    fetchSG('saunton',51.1059,-4.2178),
    fetchSG('restbay',51.4878,-3.7127)
  ]).then(function(){
    sgLoaded=true;
    btn.textContent='Accurate waves loaded ✓';
    btn.classList.add('loaded');
    btn.disabled=true;
    buildComp();render();
    // Refresh popup if open
    if(currentPopSid&&currentPopDi!=null)openPop(currentPopSid,currentPopDi);
  }).catch(function(){
    btn.disabled=false;btn.textContent='Load accurate wave data';
    alert('Could not load Stormglass data. Check connection.');
  });
}

function init(){
  sgLoaded=false;
  var btn=document.getElementById('sgBtn');
  btn.textContent='Load accurate wave data';btn.classList.remove('loaded');btn.disabled=false;
  var rb=document.getElementById('refreshBtn');rb.disabled=true;rb.textContent='↻ Loading…';
  document.getElementById('main').innerHTML='<div class="state-box"><span class="spin"></span>Fetching forecast &amp; tides…</div>';
  Promise.all([
    fetchWx('weston',      51.346, -2.9878),
    fetchWx('saunton_kite',51.1059,-4.2178),
    fetchWx('restbay',     51.4878,-3.7127),
    fetchMarine('saunton_kite',51.1059,-4.2178),
    fetchMarine('restbay', 51.4878,-3.7127),
    fetchTides('weston', AD_STATIONS.weston),
    fetchTides('saunton',AD_STATIONS.saunton),
    fetchTides('restbay',AD_STATIONS.restbay)
  ]).then(function(){
    wxData['saunton_sup']=wxData['saunton_kite'];
    rb.disabled=false;rb.textContent='↻ Refresh';
    buildComp();render();
  });
}
init();
</script>
